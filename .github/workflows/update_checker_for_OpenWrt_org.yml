name: Update Checker for OpenWrt.org

concurrency:
  group: update-checker-openwrt-org
  cancel-in-progress: true

env:
  # REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main

on:
  workflow_dispatch:
  schedule:
   - cron: 0 */10 * * *

jobs:
  check:
    runs-on: ubuntu-latest

    steps:

    - name: Get Commit Hash
      id: getHash
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH .
        #echo "::set-output name=commitHash::$(git rev-parse HEAD)"
        #echo "{commitHash}={$(git rev-parse HEAD)}" >> $GITHUB_OUTPUT
        COMMIT_HASH=$(git rev-parse HEAD)
        echo "commitHash=$COMMIT_HASH" >> $GITHUB_OUTPUT
        echo "commitHash为：$COMMIT_HASH"

    - name: Compare Commit Hash
      id: cacheHash
      uses: actions/cache@main
      with:
        path: .commitHash
        key: HEAD-${{ steps.getHash.outputs.commitHash }}

    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        echo ${{ steps.getHash.outputs.commitHash }} | tee .commitHash

    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@main
      with:
        token: ${{ secrets.ACTIONS_TRIGGER_PAT }}
        event-type: Openwrt.org Source Code Update
        client-payload: '{"repo_url": "${{ env.REPO_URL }}"}' # 传递源码仓库的URL

  cleanup:
    needs: check
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
    - name: Delete workflow runs
      if: always()
      run: |
        echo "Workflow runs are cleaned up centrally by cleanup-workflow-runs.yml"
        echo "This workflow keeps the latest 2 successful and 2 failed runs"
        echo "Daily cleanup runs at 3 AM UTC (11 AM China time)"
