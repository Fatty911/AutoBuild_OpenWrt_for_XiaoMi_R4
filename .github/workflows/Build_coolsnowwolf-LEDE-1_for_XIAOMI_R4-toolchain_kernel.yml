name: Build coolsnowwolf-LEDE 1 Toolchain and Kernel for XIAOMI_R4

on:
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/Build_coolsnowwolf-LEDE-1_for_XIAOMI_R4-toolchain_kernel.yml
      - custom_configs/config_for_coolsnowwolf
      - custom_scripts/diy-part1.sh
      - custom_scripts/diy-part2.sh
      - package/luci-app-autoupdate/**
  repository_dispatch:
    types: coolsnowwolf Source Code Update
  workflow_dispatch:
    # inputs:
    #   ssh:
    #     description: 'SSH connection to Actions'
    #     required: false
    #     default: 'false'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom_configs/config_for_coolsnowwolf
  DIY_P1_SH: custom_scripts/diy-part1.sh
  DIY_P2_SH: custom_scripts/diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  ACTIONS_STEP_DEBUG: true
  SOURCE: coolsnowwolf

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-22.04
    outputs:
      mega_upload: ${{ steps.build_job_outputs.outputs.mega_upload }}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 512
          swap-size-mb: 1024
          build-mount-path: /workdir
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* mongodb* moby* snap* || true
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install parallel cpulimit libpam0g-dev liblzma-dev libsnmp-dev gcc g++ build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch flex bison make autoconf texinfo unzip sharutils subversion ncurses-term zlib1g-dev ccache upx lib32gcc-s1 libc6-dev-i386 uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev libglib2.0-dev xmlto qemu-utils automake libtool
          sudo -E apt-get -qq install libcrypto++-dev qtbase5-dev qtbase5-dev-tools qtchooser qt5-qmake qtbase5-private-dev libqt5sql5 libqt5sql5-mysql libqt5sql5-odbc libqt5sql5-psql libqt5sql5-sqlite libqt5sql5-tds qttools5-dev-tools
          UBUNTU_VERSION=$(lsb_release -rs)
          if [[ $UBUNTU_VERSION == 20.04 ]]; then
              sudo apt-get -y install lib32gcc1
          elif [[ $UBUNTU_VERSION == 22.04 ]]; then
              sudo apt-get -y install lib32gcc-s1
          else
              sudo apt-get -y install lib32gcc-s1
              echo "非Ubuntu20.04或22.04系统，安装lib32gcc可能失败，如果失败请检查对应系统安装libgcc32的命令"
          fi
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo apt -y install python3-pip
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R $USER:$GROUPS /workdir
          sudo chown -R $USER:$GROUPS $GITHUB_WORKSPACE
          # 把 pip/Go 缓存重定向到 /workdir，避免写满根分区
          mkdir -p /workdir/pip-cache /workdir/go-cache /workdir/go-mod-cache
          pip install --cache-dir /workdir/pip-cache mega.py || pip3 install --cache-dir /workdir/pip-cache mega.py || exit 1
          echo "GOPATH=/workdir/go-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=/workdir/go-mod-cache" >> $GITHUB_ENV
          echo "GOCACHE=/workdir/go-cache" >> $GITHUB_ENV
      
      - name: Clone source code
        working-directory: /workdir
        run: |
          sudo chown -R $USER:$GROUPS /workdir
          df -hT
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds and Install feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Apply WiFi configuration
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          chmod +x $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh
          $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh openwrt/files/etc/config/wireless

      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Check space usage after download
        if: (!cancelled())
        run: df -hT


      - name: Compile tools
        run: |
          cd openwrt
          make tools/install -j1 V=s > tools.log 2>&1 || {
            LOG_TAIL=$(tac tools.log | awk '/Entering directory/{count++} count==3{exit}1' | tac)
            [ -z "$LOG_TAIL" ] && LOG_TAIL=$(tail -n 100 tools.log)
            echo "编译错误日志摘要："
            echo "$LOG_TAIL"
            exit 1
          }

      - name: Compile toolchain
        id: compile_toolchain
        run: |
          cd openwrt
          set +e
          make toolchain/install -j1 V=s > toolchain.log 2>&1 || {
            LOG_TAIL=$(tac toolchain.log | awk '/Entering directory/{count++} count==3{exit}1' | tac)
            [ -z "$LOG_TAIL" ] && LOG_TAIL=$(tail -n 100 toolchain.log)
            echo "编译错误日志摘要："
            echo "$LOG_TAIL"
            exit 1
          }

      - name: Compile kernel
        run: |
          cd openwrt
          make target/linux/compile -j1 V=s > kernel.log 2>&1 || {
            LOG_TAIL=$(tac kernel.log | awk '/Entering directory/{count++} count==3{exit}1' | tac)
            [ -z "$LOG_TAIL" ] && LOG_TAIL=$(tail -n 100 kernel.log)
            echo "编译错误日志摘要："
            echo "$LOG_TAIL"
            exit 1
          }
      - name: 编译Luci-base
        run: |
          cd openwrt
          make -j$(nproc) package/feeds/luci/luci-base/compile V=s || make -j1 package/feeds/luci/luci-base/compile V=s
      - name: Compile  Batman-adv
        id: compile_batman_1
        run: |   
          cd openwrt
          make -j2 package/feeds/routing/batman-adv/compile V=s 
              
      - name: 归档前清理
        run: |
          cd /workdir/openwrt
          rm -f *.log
          rm -rf dl tmp .git
          rm -rf build_dir/host build_dir/hostpkg-*
          rm -rf staging_dir/host staging_dir/hostpkg
          find build_dir/target-* -name "*.o" -delete 2>/dev/null || true
          find build_dir/target-* -name "*.a" -delete 2>/dev/null || true
          df -hT

      - name: 归档
        run: |
          cd /workdir
          tar -cf - openwrt/ | pigz > ${{ env.SOURCE }}.tar.gz
          ls -lh ${{ env.SOURCE }}.tar.gz
          # 保持文件在 /workdir，避免占用根分区空间

      - name: Upload to MEGA
        working-directory: /workdir
        env:
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          ls -lh ${{ env.SOURCE }}.tar.gz || echo "归档文件不存在"
          python $GITHUB_WORKSPACE/custom_scripts/mega_manager.py upload
          echo "MEGA_UPLOAD_SUCCESS=true" >> $GITHUB_ENV

      - name: Record build job outputs
        id: build_job_outputs
        if: success()
        run: echo "mega_upload=true" >> $GITHUB_OUTPUT

      - name: Validate build output
        if: success()
        env:
          MEGA_UPLOAD_SUCCESS: ${{ env.MEGA_UPLOAD_SUCCESS }}
          SOURCE: coolsnowwolf
        run: python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py

      - name: Auto fix with AI on failure
        if: failure()
        env:
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_LIST: ${{ secrets.OPENROUTER_MODEL_LIST }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_PROXY_URL: ${{ secrets.XAI_PROXY_URL }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_MODEL_LIST: ${{ secrets.MINIMAX_MODEL_LIST }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ATOMGIT_MODEL_LIST: ${{ secrets.ATOMGIT_MODEL_LIST }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          MODELSCOPE_MODEL_LIST: ${{ secrets.MODELSCOPE_MODEL_LIST }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_MODEL_LIST: ${{ secrets.SILICONFLOW_MODEL_LIST }}
          GLM_PROXY_URL: ${{ secrets.GLM_PROXY_URL }}
          CLAUDE_PROXY_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          CLAUDE_PROXY_API_KEY: ${{ secrets.CLAUDE_PROXY_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
          MODAL_MODEL_LIST: ${{ secrets.MODAL_MODEL_LIST }}
          ACTIONS_TRIGGER_PAT: ${{ secrets.ACTIONS_TRIGGER_PAT }}
          WORKFLOW_FILE: .github/workflows/Build_coolsnowwolf-LEDE-1_for_XIAOMI_R4-toolchain_kernel.yml
        run: |
          pip install requests --quiet || true
          python custom_scripts/auto_fix_with_AI_LLM.py

      - name: Delete workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
