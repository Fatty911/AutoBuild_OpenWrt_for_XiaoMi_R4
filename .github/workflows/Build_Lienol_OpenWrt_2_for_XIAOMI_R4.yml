name: Build Lienol 2 packages and fixes for XIAOMI_R4

on:
  workflow_run:
    workflows: ["Build Lienol 1 Tools and Kernel before packages for XIAOMI_R4"]  # 工作流 1 的名称
    types:
      - completed  # 当工作流 1 完成时触发
  workflow_dispatch:
  push:
    branches: 
      - master
      - main
    paths:
      - 'custom_scripts/**'
      - 'custom_configs/**'
      - .github/workflows/Build_Lienol_OpenWrt_2_for_XIAOMI_R4.yml
      - package/luci-app-autoupdate/**

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/Lienol/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom_configs/config_for_Lienol
  DIY_P1_SH: custom_scripts/diy-part1.sh
  DIY_P2_SH: custom_scripts/diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  SOURCE: Lienol

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'push' }}
    steps:

    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
          root-reserve-mb: 4096
          temp-reserve-mb: 1024
          swap-size-mb: 1024
          build-mount-path: /workdir
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* mongodb* moby* snap* || true
        sudo -E apt-get -qq update
        sudo apt install -y perl build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-pip rsync bc wget ccache flex bison libelf-dev jq parallel pigz
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown -R $USER:$GROUPS /workdir
        sudo chown -R $USER:$GROUPS $GITHUB_WORKSPACE
        pip install "tenacity>=8.0.0" "pycryptodome>=3.9.6" "requests" "pathlib" && pip install "mega.py==1.0.8" --no-deps || exit 1

    - name: Download from MEGA
      env:
        MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
        MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
      run: |
        # 下载到 /workdir（构建挂载点），避免占用根文件系统空间
        python $GITHUB_WORKSPACE/custom_scripts/mega_manager.py download ${{ env.SOURCE }} /workdir
    
    - name: 解压文件
      run: |
        echo "解压前磁盘空间："
        df -hT
        cd /workdir
        
        # 清理旧的 openwrt 目录，避免检查误判
        echo "清理旧的 openwrt 目录..."
        rm -rf openwrt
        
        # 查找下载的 tar.gz 文件（可能文件名不是预期的）
        TAR_FILE=$(ls -t *.tar.gz 2>/dev/null | head -1)
        
        if [ -z "$TAR_FILE" ]; then
          echo "::error::未找到任何 .tar.gz 文件，MEGA下载可能失败"
          echo "当前目录内容:"
          ls -la
          exit 1
        fi
        
        echo "找到下载文件: $TAR_FILE"
        echo "文件大小: $(du -h "$TAR_FILE" | cut -f1)"
        tar -xzf "$TAR_FILE"
        rm -f "$TAR_FILE"
        
        # 列出解压后的目录结构
        echo "解压后的目录结构:"
        ls -la
        
        # 检查 openwrt 目录是否存在
        if [ ! -d "openwrt" ]; then
          echo "::error::解压后未找到 openwrt 目录"
          echo "当前目录内容:"
          ls -la
          exit 1
        fi
        
        echo "openwrt 目录内容:"
        ls -la openwrt/ | head -20
        
        echo "清理旧文件..."
        rm -rf openwrt/.git
        rm -rf openwrt/build_dir/toolchain-*
        rm -rf openwrt/build_dir/host
        rm -rf openwrt/build_dir/hostpkg-*
        rm -rf openwrt/staging_dir/toolchain-*
        rm -rf openwrt/staging_dir/host
        rm -rf openwrt/staging_dir/hostpkg
        find openwrt/build_dir -name "*.o" -delete 2>/dev/null || true
        find openwrt/build_dir -name "*.a" -delete 2>/dev/null || true
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        
        # 验证符号链接和 Makefile
        echo "验证符号链接:"
        ls -la $GITHUB_WORKSPACE/openwrt
        echo "检查 Makefile:"
        if [ -f "$GITHUB_WORKSPACE/openwrt/Makefile" ]; then
          echo "Makefile 存在"
          head -20 $GITHUB_WORKSPACE/openwrt/Makefile
        else
          echo "::error::Makefile 不存在！"
          exit 1
        fi
        
        echo "解压后磁盘空间："
        df -hT

    - name: Sync OpenWrt config
      run: |
        cd openwrt
        make defconfig
        echo "=== defconfig 完成 ==="

    - name: Compile Remaining packages
      id: compile_remaining
      # if: steps.main_packages.conclusion == 'success'
      run: |
        # 确保 openwrt 目录存在且有 Makefile
        if [ ! -d "openwrt" ]; then
          echo "::error::openwrt 目录不存在"
          ls -la
          exit 1
        fi
        if [ ! -f "openwrt/Makefile" ]; then
          echo "::error::openwrt/Makefile 不存在"
          ls -la openwrt/
          exit 1
        fi
        cd openwrt
        # set -x
        LOG_FILE="packages.log"
        # 确保 custom_scripts/compile_with_retry.py 和 custom_scripts/extract_last_error.py 存在
        cp -f $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py . || echo "Warning: custom_scripts/compile_with_retry.py not found in workspace"
        cp -f $GITHUB_WORKSPACE/custom_scripts/extract_last_error.py . || echo "Warning: custom_scripts/extract_last_error.py not found in workspace"
        echo "=== 检查并尝试编译 packages 部分 ==="
        if make -n package/compile V=s >/dev/null 2>&1; then
          {
            make package/compile V=s > packages.log 2>&1 || {
              echo "首次编译 packages 失败，尝试运行修复脚本..."
              python custom_scripts/compile_with_retry.py --max-retry 1 "make package/compile V=s" "packages.log"
            }
          } || true
          echo "=== packages 编译步骤结束 ==="
          # 提取最后一个失败组件的日志
          python custom_scripts/extract_last_error.py --log-dir . --output last_error.log --max-chars 8000 || true
          if [ -f last_error.log ] && grep -q "error\|failed\|Error" last_error.log 2>/dev/null; then
            echo "PACKAGES_BUILD_FAILED=true" >> $GITHUB_ENV
            echo "检测到 packages 编译失败，已记录错误日志"
          fi
        else
          echo "当前源码不支持目标 package/compile，跳过该步骤，交给后续整包固件编译。"
        fi

    - name: Detect packages build failure
      id: detect_packages_failure
      run: |
        if [ "$PACKAGES_BUILD_FAILED" = "true" ]; then
          echo "检测到 packages 编译失败，准备提取错误信息..."
          cd openwrt
          python custom_scripts/extract_last_error.py --log-dir . --output ../last_error.log --max-chars 8000 || true
          echo "failure_detected=true" >> $GITHUB_OUTPUT
        else
          echo "failure_detected=false" >> $GITHUB_OUTPUT
        fi

    - name: Try compiling the firmware
      id: compile_attempt
      run: |
        set -euo pipefail
        cd openwrt
        make defconfig
        [ -f Makefile ] || { echo "::error::openwrt/Makefile 不存在，工作目录异常"; exit 1; }
        echo "开始执行修复后重试编译..."
        LOG_FILE="compile.log"
        # 确保 custom_scripts/compile_with_retry.py 和 custom_scripts/extract_last_error.py 存在
        cp -f $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py . || echo "Warning: custom_scripts/compile_with_retry.py not found in workspace"
        cp -f $GITHUB_WORKSPACE/custom_scripts/extract_last_error.py . || echo "Warning: custom_scripts/extract_last_error.py not found in workspace"
        echo "=== 先构建 root filesystem ==="
        make target/compile V=s > rootfs_compile.log 2>&1 || true
        echo "=== root filesystem 构建完成，开始完整固件编译 ==="
        {
          make -j1 V=s > compile.log 2>&1 || {
            echo "首次固件编译失败，尝试运行修复脚本..."
            python custom_scripts/compile_with_retry.py --max-retry 1 "make -j1 V=s" "compile.log"
          }
        } || true
        echo "=== firmware 初始编译步骤结束 ==="
        # 提取最后一个失败组件的日志
        python custom_scripts/extract_last_error.py --log-dir . --output last_error.log --max-chars 8000 || true
        if [ -f last_error.log ] && grep -q "error\|failed\|Error" last_error.log 2>/dev/null; then
          echo "FIRMWARE_BUILD_FAILED=true" >> $GITHUB_ENV
          echo "检测到 firmware 编译失败，已记录错误日志"
        fi

    - name: Detect firmware build failure
      id: detect_firmware_failure
      run: |
        if [ "$FIRMWARE_BUILD_FAILED" = "true" ]; then
          echo "检测到 firmware 编译失败，准备提取错误信息..."
          cd openwrt
          python custom_scripts/extract_last_error.py --log-dir . --output ../last_error.log --max-chars 8000 || true
          echo "failure_detected=true" >> $GITHUB_OUTPUT
        else
          echo "failure_detected=false" >> $GITHUB_OUTPUT
        fi

    - name: Check for .bin file after initial compilation
      id: check_bin_initial
      run: |
        BIN_FOUND=false
        for file in openwrt/bin/targets/*/*/*.bin; do
          if [ -f "$file" ] && [[ ! "$file" =~ initramfs ]]; then
            BIN_FOUND=true
            echo "存在.bin固件: $file"
            break
          fi
        done
        if [ "$BIN_FOUND" = "true" ]; then
          echo "BIN_EXISTS=true" >> $GITHUB_ENV
          echo "bin_status=success" >> $GITHUB_ENV
        else
          echo "BIN_EXISTS=false" >> $GITHUB_ENV
        fi

    - name: Perform manual porting for Xiaomi Mi Router 4
      id: transplant
      if: env.BIN_EXISTS == 'false'
      run: |
        cd openwrt
        echo "Performing manual porting for Xiaomi Mi Router 4..."
        git clone https://github.com/coolsnowwolf/lede lede-source
        cp lede-source/target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts target/linux/ramips/dts/
        cp lede-source/target/linux/ramips/dts/mt7621_xiaomi_nand_128m.dtsi target/linux/ramips/dts/ 2>/dev/null || true
        cp -r lede-source/target/linux/ramips/mt7621/base-files target/linux/ramips/mt7621/ 2>/dev/null || true
        rm -rf lede-source

        echo "修复 DTS nvmem-layout 兼容性..."
        python3 $GITHUB_WORKSPACE/custom_scripts/fix_dts_nvmem_layout.py .

        echo "=== Lienol2: 修复 base-files 版本 ==="
        if [ -f "package/base-files/Makefile" ]; then
          sed -i 's/PKG_RELEASE:=$(COMMITCOUNT)/PKG_RELEASE:=1/' package/base-files/Makefile || echo 'PKG_RELEASE:=1' >> package/base-files/Makefile
          echo "base-files PKG_RELEASE 已设为 1"
        fi
        echo "isFixed=true" >> $GITHUB_OUTPUT
        
    - name: Compile the firmware with fixes
      id: compile
      if: env.BIN_EXISTS == 'false' && steps.transplant.outputs.isFixed == 'true'
      run: |
        set -euo pipefail
        cd openwrt
        make defconfig
        cp -f $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py . || echo "Warning: custom_scripts/compile_with_retry.py not found in workspace"
        cp -f $GITHUB_WORKSPACE/custom_scripts/extract_last_error.py . || echo "Warning: custom_scripts/extract_last_error.py not found in workspace"
        echo "=== 先构建 root filesystem ==="
        make target/compile V=s > rootfs_compile.log 2>&1 || true
        echo "=== root filesystem 构建完成，开始完整固件编译 ==="
        {
          make -j1 V=s > compile.log 2>&1 || {
            echo "修复后编译固件仍失败，尝试运行修复脚本..."
            python custom_scripts/compile_with_retry.py --max-retry 1 "make -j1 V=s" "compile.log"
          }
        } || true
        echo "=== 固件编译步骤结束 ==="
        # 提取最后一个失败组件的日志
        python custom_scripts/extract_last_error.py --log-dir . --output last_error.log --max-chars 8000 || true
        if [ -f last_error.log ] && grep -q "error\|failed\|Error" last_error.log 2>/dev/null; then
          echo "FIXED_BUILD_FAILED=true" >> $GITHUB_ENV
          echo "检测到固件编译失败，已记录错误日志"
        fi
        echo "bin_status=success" >> $GITHUB_ENV

    - name: Detect fixed firmware build failure
      id: detect_fixed_failure
      run: |
        if [ "$FIXED_BUILD_FAILED" = "true" ]; then
          echo "检测到固件编译失败，准备提取错误信息..."
          cd openwrt
          python custom_scripts/extract_last_error.py --log-dir . --output ../last_error.log --max-chars 8000 || true
          echo "failure_detected=true" >> $GITHUB_OUTPUT
        else
          echo "failure_detected=false" >> $GITHUB_OUTPUT
        fi
        
    - name: "Gate: Ensure .bin exists before release"
      id: gate_bin
      run: |
        cd openwrt
        echo "=== 检查 .bin 固件是否存在 ==="
        BIN_COUNT=$(ls bin/targets/*/*/*.bin 2>/dev/null | grep -v initramfs | wc -l)
        echo "找到 $BIN_COUNT 个 .bin 固件（排除 initramfs）"
        if [ "$BIN_COUNT" -eq 0 ]; then
          echo "::error::没有找到任何 .bin 固件，终止工作流"
          echo "BUILD_GATE_FAILED=true" >> $GITHUB_ENV
          exit 1
        fi
        echo "BUILD_GATE_PASSED=true" >> $GITHUB_ENV
        
    - name: Check for .bin file after final compilation
      id: check_bin_final
      run: |
        BIN_FOUND=false
        for file in openwrt/bin/targets/*/*/*.bin; do
          if [ -f "$file" ] && [[ ! "$file" =~ initramfs ]]; then
            BIN_FOUND=true
            echo "存在.bin固件: $file"
            break
          fi
        done
        if [ "$BIN_FOUND" = "true" ]; then
          echo "FINAL_BIN_EXISTS=true" >> $GITHUB_ENV
        else
          echo "FINAL_BIN_EXISTS=false" >> $GITHUB_ENV
          echo "没找到.bin固件（排除initramfs后）"
        fi

    - name: Cleanup invalid releases (no .bin)
      if: env.FINAL_BIN_EXISTS == 'false'
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        echo "没有找到 .bin 固件，清理可能存在的无效 Release..."
        python $GITHUB_WORKSPACE/custom_scripts/clean_invalid_releases.py || echo "清理脚本执行失败或不存在，跳过"

    - name: Build Quality Gate
      id: build_quality_gate
      run: |
        python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py --gate
      env:
        SOURCE: ${{ env.SOURCE }}

    - name: Upload debug logs on failure
      if: env.BUILD_QUALITY_GATE == 'fail'
      run: |
        cd openwrt
        echo "=== 调试信息 ===" > debug.log
        echo "BIN_EXISTS=$BIN_EXISTS" >> debug.log
        echo "FINAL_BIN_EXISTS=$FINAL_BIN_EXISTS" >> debug.log
        echo "isFixed=${{ steps.transplant.outputs.isFixed }}" >> debug.log
        echo "" >> debug.log
        echo "=== openwrt/bin/targets 目录结构 ===" >> debug.log
        ls -la bin/targets/*/* 2>/dev/null || echo "目录不存在" >> debug.log
        echo "" >> debug.log
        echo "=== .config 最后50行 ===" >> debug.log
        tail -50 .config >> debug.log 2>/dev/null || echo ".config不存在" >> debug.log
        echo "" >> debug.log
        echo "=== feed目录 ===" >> debug.log
        ls -la feeds/ 2>/dev/null >> debug.log || echo "feeds目录不存在" >> debug.log
        cat feeds.conf.default >> debug.log 2>/dev/null || echo "feeds.conf.default不存在" >> debug.log
        echo "" >> debug.log
        echo "=== build日志 ===" >> debug.log
        tail -100 build.log >> debug.log 2>/dev/null || echo "build.log不存在" >> debug.log
        echo "调试信息已保存到 debug.log"
        cat debug.log
      shell: bash

    - name: Upload debug artifact
      if: env.BUILD_QUALITY_GATE == 'fail'
      uses: actions/upload-artifact@main
      with:
        name: debug-logs-Lienol-2
        path: openwrt/debug.log

    - name: Set environment variables
      id: setEnv
      run: |
        cd openwrt
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "TARGET_BOARD=$(grep '^CONFIG_TARGET_BOARD=' .config | sed -r 's/.*="(.*)"/\1/')" >> $GITHUB_ENV
        echo "TARGET_SUBTARGET=$(grep '^CONFIG_TARGET_SUBTARGET=' .config | sed -r 's/.*="(.*)"/\1/')" >> $GITHUB_ENV
        echo "TARGET_PROFILE=$(grep '^CONFIG_TARGET_PROFILE=' .config | sed -r 's/.*="(.*)"/\1/' | sed 's/^DEVICE_//')" >> $GITHUB_ENV
        echo "DEVICE_NAME=$TARGET_PROFILE" >> $GITHUB_ENV
        KERNEL_VERSION=$(ls build_dir/target-*_*/linux-*/ | grep -oP 'linux-\K\d+\.\d+\.\d+')
        echo "kernel_version=$KERNEL_VERSION" >> $GITHUB_ENV
        echo "set_env_variables=true" >> $GITHUB_OUTPUT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_${{ env.SOURCE }}_bin_${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_${{ env.FILE_DATE }}
        path: |
          openwrt/bin
          openwrt/.config

    - name: Organize files
      id: organize
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "firmware_path=$(pwd)" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      with:
        name: OpenWrt_${{ env.SOURCE }}_firmware_${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_${{ env.FILE_DATE }}
        path: ${{ env.firmware_path }}

    - name: Generate release tag
      id: generate_release_tag
      run: |
        echo "release_tag=Lienol_${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        echo "release_tag_status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      env:
        GITHUB_TOKEN: ${{ github.token }}
      with:
          token: ${{ github.token }}
          files: |
            openwrt/bin/targets/**/*.bin
          name: OpenWRT_${{ steps.generate_release_tag.outputs.release_tag }}
          tag_name: OpenWRT_${{ steps.generate_release_tag.outputs.release_tag }}

    - name: Delete temporary files from MEGA
      env:
        MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
        MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
      run: |
        python $GITHUB_WORKSPACE/custom_scripts/mega_manager.py delete

    - name: Validate build output
      run: |
        python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py

    - name: Extract Error Log
      if: failure()
      run: |
        cd $GITHUB_WORKSPACE
        python custom_scripts/extract_last_error.py --log-dir openwrt --output last_error.log || true

    - name: Upload Error Log Artifact
      uses: actions/upload-artifact@main
      if: failure()
      with:
        name: error-log
        path: last_error.log
        retention-days: 1
    - name: Delete workflow runs
      if: always()
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 2
    - name: Auto fix with AI on failure
      if: failure()
      run: |
        echo "Build failed, auto-fix triggered"
        python $GITHUB_WORKSPACE/custom_scripts/auto_fix.py || true