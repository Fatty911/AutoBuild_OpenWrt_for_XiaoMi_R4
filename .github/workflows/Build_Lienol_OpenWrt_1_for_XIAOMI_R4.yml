name: Build Lienol 1 Tools and Kernel before packages for XIAOMI_R4

on:
  repository_dispatch:
    types: Lienol Source Code Update
  workflow_dispatch:
  push:
    branches: 
      - master
      - main
    paths:
      - 'custom_scripts/diy-part1.sh'
      - 'custom_scripts/diy-part2.sh'
      - 'custom_scripts/replace_wifi_config.sh'
      - 'custom_scripts/extract_last_error.py'
      - 'custom_scripts/validate_build_output.py'
      - 'custom_scripts/mega_manager.py'
      - 'custom_configs/**'
      - .github/workflows/Build_Lienol_OpenWrt_1_for_XIAOMI_R4.yml
      - package/luci-app-autoupdate/**

concurrency:
  group: lienol1-phase1-${{ github.ref }}-${{ (endsWith(format('{0}', github.run_number), '0') || endsWith(format('{0}', github.run_number), '2') || endsWith(format('{0}', github.run_number), '4') || endsWith(format('{0}', github.run_number), '6') || endsWith(format('{0}', github.run_number), '8')) && 'even' || 'odd' }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/Lienol/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom_configs/config_for_Lienol
  DIY_P1_SH: custom_scripts/diy-part1.sh
  DIY_P2_SH: custom_scripts/diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  SOURCE: Lienol
  # 自动更新插件配置
  AUTOPDATE_GITHUB_REPO: Fatty911/AutoBuild_OpenWrt_for_XiaoMi_R4
  AUTOPDATE_WORKFLOW: Lienol
  AUTOPDATE_SUBSCRIPTION: ${{ secrets.SUBSCRIPTION_URL }}
  AUTOPDATE_PROXY_PORT: 1080

jobs:
  build:
    runs-on: ubuntu-22.04
    outputs:
      mega_upload: ${{ steps.build_job_outputs.outputs.mega_upload }}
    steps:
    
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
          root-reserve-mb: 2048
          temp-reserve-mb: 512
          swap-size-mb: 1024
          build-mount-path: /workdir
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
        sudo -E apt-get -qq update
        sudo apt install -y perl build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-pip rsync bc wget ccache flex bison libelf-dev jq parallel pigz
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown -R $USER:$GROUPS /workdir
        sudo chown -R $USER:$GROUPS $GITHUB_WORKSPACE
        mkdir -p /workdir/pip-cache /workdir/go-cache /workdir/go-mod-cache
        pip install --cache-dir /workdir/pip-cache "tenacity>=8.0.0" "pycryptodome>=3.9.6" "requests" "pathlib" || exit 1
        curl -fsSL https://mega.nz/keys/MEGA_signing.key | sudo gpg --dearmor -o /usr/share/keyrings/meganz-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/meganz-archive-keyring.gpg] https://mega.nz/linux/repo/xUbuntu_22.04/ ./" | sudo tee /etc/apt/sources.list.d/mega.list
        sudo apt update && sudo apt install -y megacmd
        echo "GOPATH=/workdir/go-cache" >> $GITHUB_ENV
        echo "GOMODCACHE=/workdir/go-mod-cache" >> $GITHUB_ENV
        echo "GOCACHE=/workdir/go-cache" >> $GITHUB_ENV
      
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        sudo chown -R $USER:$GROUPS /workdir
        df -hT
        
        # 获取 OpenWrt 官方最新稳定版本号
        echo "获取 OpenWrt 官方最新稳定版本..."
        STABLE_VERSION=$(curl -s https://downloads.openwrt.org/releases/ | grep -oP 'href="\K[\d.]+' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
        echo "完整版本号: $STABLE_VERSION"
        
        # 提取主版本号（如 25.12.0 -> 25.12）
        MAJOR_VERSION=$(echo "$STABLE_VERSION" | cut -d'.' -f1,2)
        echo "主版本号: $MAJOR_VERSION"
        
        # 构建分支列表：同时尝试主版本号和完整版本号
        BRANCHES=(
          "main"
          "master"
          "$MAJOR_VERSION"
          "$STABLE_VERSION"
          "openwrt-${MAJOR_VERSION}"
          "openwrt-${STABLE_VERSION}"
        )
        echo "尝试分支列表: ${BRANCHES[*]}"
        
        # 尝试每个分支
        for branch in "${BRANCHES[@]}"; do
          echo "尝试分支: $branch"
          if git clone ${{ env.REPO_URL }} -b "$branch" openwrt 2>/dev/null; then
            echo "成功克隆分支: $branch"
            echo "REPO_BRANCH=$branch" >> $GITHUB_ENV
            break
          else
            echo "分支 $branch 不存在"
            rm -rf openwrt 2>/dev/null || true
          fi
        done
        
        if [ ! -d "openwrt" ]; then
          echo "错误: 所有分支尝试失败"
          exit 1
        fi
        
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update and Install feeds
      run: |
        cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a
        echo "=== feeds install 后再次禁用 fullconenat ==="
        find package feeds -path "*/fullconenat/Makefile" -delete 2>/dev/null || true
        for f in $(find package feeds -type d -name "fullconenat" 2>/dev/null); do
          echo "删除 fullconenat 目录: $f"
          rm -rf "$f"
        done || true

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Apply WiFi configuration
      env:
        WIFI_SSID: ${{ secrets.WIFI_SSID }}
        WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
      run: |
        chmod +x $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh
        $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh openwrt/files/etc/config/wireless

    - name: Download package
      id: download
      run: |
        cd openwrt
        # Run make defconfig with auto-fix for recursive Kconfig deps
        for i in 1 2 3 4 5; do
          output=$(make defconfig 2>&1) && break
          if echo "$output" | grep -q "recursive dependency detected"; then
            echo "Recursive dependency detected, attempting auto-fix..."
            echo "$output" | python3 ../custom_scripts/fix_kconfig_cycle.py --once || true
          else
            echo "$output"
            exit 1
          fi
        done
        make download -j$(nproc) V=s
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    - name: Check space usage after download
      if: (!cancelled())
      run: df -hT
    
    - name: Compile tools
      id: compile_tools
      env:
        TERM: dumb
      run: |
        cd openwrt
        make tools/install -j$(nproc) V=s > tools.log 2>&1 || make tools/install -j1 V=s > tools.log 2>&1

    - name: Compile toolchain
      id: compile_toolchain
      run: |
        cd openwrt
        make toolchain/install -j$(nproc) V=s > toolchain.log 2>&1 || make toolchain/install -j1 V=s > toolchain.log 2>&1

    - name: Compile kernel
      id: compile_kernel
      run: |
        cd openwrt
        # 修复 CRYPTO_DEV_EIP93_AES 内核配置冲突
        # Lienol 内核 6.12 Kconfig 新增 EIP93_AES 子选项但无默认值
        # 直接追加到所有相关 config 文件中（set -e 下用 || true 防护）
        for KCFG in target/linux/ramips/mt7621/config-* target/linux/generic/config-*; do
          [ -f "$KCFG" ] || continue
          echo "CONFIG_CRYPTO_DEV_EIP93_AES=y" >> "$KCFG" 2>/dev/null || true
          echo "CONFIG_CRYPTO_DEV_EIP93_DES=y" >> "$KCFG" 2>/dev/null || true
          echo "CONFIG_CRYPTO_DEV_EIP93_AEAD=y" >> "$KCFG" 2>/dev/null || true
          echo "修复 $KCFG: 添加 CONFIG_CRYPTO_DEV_EIP93_AES/DES/AEAD=y"
        done
        make target/linux/compile -j$(nproc) V=s > kernel.log 2>&1 || make target/linux/compile -j1 V=s > kernel.log 2>&1

    - name: Compile packages by feeds
      id: compile_packages
      run: |
        cd openwrt
        # 保护根目录 Makefile
        cp Makefile Makefile.bak

        # 修复 base-files 版本（Lienol1 专用）
        echo "=== Lienol1: 修复 base-files 版本 ==="
        if [ -f "package/base-files/Makefile" ]; then
          sed -i 's/PKG_RELEASE:=$(COMMITCOUNT)/PKG_RELEASE:=1/' package/base-files/Makefile || true
          echo "base-files PKG_RELEASE 已设为 1"
        fi
        echo "=== 快速预检查：移除可能不存在的包 ==="
        for PKG in xray-plugin xray-core v2ray-plugin v2ray-geosite v2ray-geoip; do
          if grep -q "CONFIG_PACKAGE_${PKG}=" .config 2>/dev/null; then
            if [ ! -d "package/${PKG}" ] && [ ! -d "package/feeds/*/${PKG}" ]; then
              echo "⚠️ 移除不存在的包: ${PKG}"
              sed -i "/CONFIG_PACKAGE_.*${PKG}/d" .config 2>/dev/null || true
            fi
          fi
        done
        echo "=== 强制禁用 fullconenat（上游 hash 不匹配）==="
        find package feeds -path "*/fullconenat/Makefile" -delete 2>/dev/null || true
        find package feeds -type d -name "fullconenat" -exec rm -rf {} + 2>/dev/null || true
        sed -i '/CONFIG_PACKAGE_.*fullconenat/d' .config 2>/dev/null || true
        rm -f tmp/.packagedeps
        make defconfig > /dev/null 2>&1 || true
        # 一次性编译所有包（使用并行编译，比逐个编译快得多）
        echo "=== 开始并行编译所有包 ==="
        echo "开始时间: $(date)"
        if make package/compile -j$(nproc) V=s > packages.log 2>&1; then
          echo "所有包编译成功 于 $(date)"
        else
          echo "⚠️ 包编译失败，尝试修复..."
          tail -n 100 packages.log
          # 检查是否是 "No rule to make target" 错误（包在 feeds 中不存在）
          if grep -q "No rule to make target" packages.log; then
            missing_pkgs=$(grep "No rule to make target" packages.log | sed 's/.*No rule to make target .package\/\([^\/]*\)\/compile.*/\1/' | sort -u)
            if [ -n "$missing_pkgs" ]; then
              echo "⚠️ 以下包在 feeds 中不存在，将从 .config 中移除:"
              echo "$missing_pkgs"
              for m_pkg in $missing_pkgs; do
                sed -i "/CONFIG_PACKAGE_.*${m_pkg}/d" .config 2>/dev/null || true
                m_pkg_underscored=$(echo "$m_pkg" | tr '-' '_')
                if [ "$m_pkg_underscored" != "$m_pkg" ]; then
                  sed -i "/CONFIG_PACKAGE_.*${m_pkg_underscored}/d" .config 2>/dev/null || true
                fi
              done
              rm -f tmp/.packagedeps 2>/dev/null || true
              make defconfig > /dev/null 2>&1 || true
              echo "重新编译..."
              make package/compile -j$(nproc) V=s > packages.log 2>&1 || {
                echo "⚠️ 移除缺失包后仍然失败"
                tail -n 100 packages.log
              }
            fi
          fi
        fi
        echo "结束时间: $(date)"

    - name: Complete build with make world
      id: complete_build
      run: |
        cd openwrt
        export PATH="$PWD/staging_dir/host/bin:$PWD/staging_dir/hostpkg/bin:$PATH"
        echo "=== 执行 make -j1 V=s（完成剩余构建，包括 package/install）==="
        echo "OpenWrt 的 package/install 目标不能单独调用，只能在 make world 的完整上下文中工作"
        echo "开始时间: $(date)"
        # 运行完整的 make world（默认目标），它会自动调用 package/install
        make -j1 V=s > complete_build.log 2>&1 || {
          echo "⚠️ make -j1 V=s 失败，尝试查看错误..."
          tail -n 100 complete_build.log
          # 检查是否是 hash mismatch 或 failed to build 错误（如 fullconenat）
          if grep -qiE "Hash mismatch.*fullconenat|fullconenat.*failed to build|fullconenat.*Error" complete_build.log; then
            echo "⚠️ fullconenat 编译失败（hash mismatch），强制删除并从 .config 移除..."
            find package feeds -path "*/fullconenat/Makefile" -delete 2>/dev/null || true
            find package feeds -type d -name "fullconenat" -exec rm -rf {} + 2>/dev/null || true
            sed -i '/CONFIG_PACKAGE_.*fullconenat/d' .config 2>/dev/null || true
            rm -f tmp/.packagedeps 2>/dev/null || true
            make defconfig > /dev/null 2>&1 || true
            echo "重新运行 make -j1 V=s..."
            make -j1 V=s > complete_build.log 2>&1 || {
              echo "⚠️ 移除 fullconenat 后仍然失败"
              tail -n 100 complete_build.log
              echo "failure_detected=true" >> $GITHUB_ENV
              exit 1
            }
          # 检查是否是 "No rule to make target" 错误（包在 feeds 中不存在）
          elif grep -q "No rule to make target" complete_build.log; then
            # 提取所有缺失的包（可能有多个）
            missing_pkgs=$(grep "No rule to make target" complete_build.log | sed 's/.*No rule to make target .package\/\([^\/]*\)\/compile.*/\1/' | sort -u)
            if [ -n "$missing_pkgs" ]; then
              echo "以下包在当前 feeds 中不存在，将从 .config 中移除:"
              echo "$missing_pkgs"
              for pkg in $missing_pkgs; do
                # 移除所有包含此包名的 CONFIG 行（包括主包和子包/变体）
                sed -i "/CONFIG_PACKAGE_.*${pkg}/d" .config 2>/dev/null || true
                # 同时处理下划线变体（有些包名使用下划线代替连字符）
                pkg_underscored=$(echo "$pkg" | tr '-' '_')
                if [ "$pkg_underscored" != "$pkg" ]; then
                  sed -i "/CONFIG_PACKAGE_.*${pkg_underscored}/d" .config 2>/dev/null || true
                fi
              done
              # 清除 package deps 缓存，强制重新生成
              rm -f tmp/.packagedeps 2>/dev/null || true
              make defconfig > /dev/null 2>&1 || true
              echo "重新运行 make -j1 V=s..."
              make -j1 V=s > complete_build.log 2>&1 || {
                echo "⚠️ 移除缺失包后仍然失败"
                tail -n 100 complete_build.log
                echo "failure_detected=true" >> $GITHUB_ENV
                exit 1
              }
            else
              echo "failure_detected=true" >> $GITHUB_ENV
              exit 1
            fi
          else
            echo "failure_detected=true" >> $GITHUB_ENV
            exit 1
          fi
        }
        echo "结束时间: $(date)"
        # 验证 root.orig-* 是否已创建
        if ls build_dir/target-*/root.orig-* >/dev/null 2>&1; then
          echo "✅ root.orig-* 已创建，Lienol2 可直接做 target/install"
          for d in build_dir/target-*/root.orig-*; do
            echo "  $(du -sh $d)"
          done
        else
          echo "❌ root.orig-* 未创建（make world 未能完成 package/install 阶段）"
          echo "failure_detected=true" >> $GITHUB_ENV
          exit 1
        fi

    - name: List main packages
      run: |
        cd openwrt
        find package/ -type d -name src -prune -o -type f -name Makefile -not -path 'package/feeds/*' -exec dirname {} \; > main_packages.txt
        echo "Main packages to compile:"
        cat main_packages.txt

    - name: Compile main packages
      id: compile_main_packages
      run: |
        cd openwrt
        while read -r pkg; do
          echo "编译 $pkg at $(date)"
          { make $pkg/compile -j2 V=s > "$pkg.log" 2>&1 && echo "在$(date) 成功编译 $pkg ";} || { make $pkg/compile -j1 V=s > "$pkg.log" 2>&1 && echo "在$(date) 成功编译 $pkg ";} || {
            echo "编译 $pkg 失败，查看编译此包时的日志"
            cat "$pkg.log"
          }
        done < main_packages.txt

    - name: 查看日志结尾300行
      if: always()
      run: |
        cd openwrt
        if [ "${{ steps.compile_tools.outcome }}" = "failure" ]; then             
          echo "Compile tools failed. Showing last 300 lines of tools.log:"             
          tail -300 tools.log           
        elif [ "${{ steps.compile_toolchain.outcome }}" = "failure" ]; then             
          echo "Compile toolchain failed. Showing last 300 lines of toolchain.log:"             
          tail -300 toolchain.log           
        elif [ "${{ steps.compile_kernel.outcome }}" = "failure" ]; then             
          echo "Compile kernel failed. Showing last 300 lines of kernel.log:"             
          tail -300 kernel.log           
        elif [ "${{ steps.compile_packages.outcome }}" = "failure" ]; then             
          echo "Compile packages failed. Showing last 300 lines of packages.log:"           
          tail -300 packages.log
        else             
          echo "All steps completed successfully. No log to show."           
        fi


    - name: 归档
      run: |
        echo "=== 归档前清理（保留可复用产物）==="
        cd /workdir/openwrt
        
        # 删除日志
        rm -f *.log
        
        # 【保留】dl 目录 - Lienol2 可以复用源码包，避免重新下载
        # rm -rf dl  # 不再删除
        
        # 【保留】staging_dir/host - Lienol2 需要用于生成固件
        # rm -rf staging_dir/host staging_dir/hostpkg  # 不删除
        
        # 【删除】编译中间文件
        rm -rf build_dir/host build_dir/hostpkg-*
        rm -rf build_dir/toolchain-*
        
        # 【删除】临时文件
        rm -rf tmp .git
        
        # 【保留】target 编译产物 - .o .a 文件用于增量编译
        # find build_dir/target-* -name "*.o" -delete 2>/dev/null || true
        # find build_dir/target-* -name "*.a" -delete 2>/dev/null || true
        
        echo "归档内容预览："
        du -sh dl staging_dir build_dir 2>/dev/null || true
        echo "归档前磁盘空间："
        df -hT
        
        cd /workdir
        tar -cf - openwrt/ | pigz > ${{ env.SOURCE }}.tar.gz
        
        # 检查归档是否成功
        if [ ! -f "${{ env.SOURCE }}.tar.gz" ]; then
          echo "::error::归档失败，未创建 ${{ env.SOURCE }}.tar.gz"
          exit 1
        fi
        
        FILE_SIZE=$(stat -c%s "${{ env.SOURCE }}.tar.gz" 2>/dev/null || stat -f%z "${{ env.SOURCE }}.tar.gz" 2>/dev/null)
        if [ "$FILE_SIZE" -lt 1000000 ]; then
          echo "::error::归档文件太小 (${FILE_SIZE} bytes)，可能损坏"
          exit 1
        fi
        
        echo "归档后磁盘空间："
        df -hT
        ls -lh ${{ env.SOURCE }}.tar.gz
        # 保持文件在 /workdir，避免占用根分区空间
    
    
      
    
    
    - name: Upload to MEGA
      working-directory: /workdir
      env:
        MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
        MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        MEGA_ERROR_LOG: /tmp/mega_error.log
      run: |
        # 检查文件是否存在
        if [ ! -f "${{ env.SOURCE }}.tar.gz" ]; then
          echo "::error::归档文件 ${{ env.SOURCE }}.tar.gz 不存在"
          exit 1
        fi
        
        echo "准备上传文件:"
        ls -lh ${{ env.SOURCE }}.tar.gz
        
        # 上传到 MEGA，失败直接终止（Phase 2 依赖此产物）
        python $GITHUB_WORKSPACE/custom_scripts/mega_manager.py upload --error-log /tmp/mega_error.log

    - name: Record build job outputs
      id: build_job_outputs
      if: success()
      run: echo "mega_upload=true" >> $GITHUB_OUTPUT

    - name: Validate build output
      if: success()
      env:
        MEGA_UPLOAD_SUCCESS: ${{ env.MEGA_UPLOAD_SUCCESS }}
        SOURCE: Lienol
      run: python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py

    - name: Extract Error Log
      if: failure() || hashFiles('/tmp/mega_error.log') != ''
      run: |
        cd $GITHUB_WORKSPACE
        if [ -f "/tmp/mega_error.log" ]; then
          cp /tmp/mega_error.log last_error.log
        else
          python custom_scripts/extract_last_error.py --log-dir openwrt --output last_error.log || true
        fi
        if [ ! -s last_error.log ]; then
          echo "extract_last_error.py 未生成有效日志，创建兜底日志..."
          echo "=== 兜底错误日志 ===" > last_error.log
          echo "提取脚本失败或日志目录不存在。请检查上游编译步骤的失败输出。" >> last_error.log
          for f in openwrt/*.log; do
            if [ -f "$f" ]; then
              echo "" >> last_error.log
              echo "=== $f (last 100 lines) ===" >> last_error.log
              tail -n 100 "$f" >> last_error.log
            fi
          done
        fi

    - name: Upload Error Log Artifact
      uses: actions/upload-artifact@main
      if: failure()
      with:
        name: error-log
        path: last_error.log
        retention-days: 1
    - name: Delete workflow runs
      if: always()
      run: |
        echo "Workflow runs are cleaned up centrally by cleanup-workflow-runs.yml"
        echo "This workflow keeps the latest 2 successful and 2 failed runs"
        echo "Daily cleanup runs at 3 AM UTC (11 AM China time)"
