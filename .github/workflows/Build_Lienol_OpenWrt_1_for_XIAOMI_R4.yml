name: Build Lienol 1 Tools and Kernel before packages for XIAOMI_R4

on:
  repository_dispatch:
    types: Lienol Source Code Update
  workflow_dispatch:
  push:
    branches: 
      - master
      - main
    paths:
      - .github/workflows/Build_Lienol_OpenWrt_1_for_XIAOMI_R4.yml
      - config_for_Lienol
      - diy-part1.sh
      - diy-part2.sh
      - package/luci-app-autoupdate/**

env:
  REPO_URL: https://github.com/Lienol/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config_for_Lienol
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  SOURCE: Lienol
  # 自动更新插件配置
  AUTOPDATE_GITHUB_REPO: Fatty911/AutoBuild_OpenWrt_for_XiaoMi_R4
  AUTOPDATE_WORKFLOW: Lienol
  AUTOPDATE_SUBSCRIPTION: ${{ secrets.SUBSCRIPTION_URL }}
  AUTOPDATE_PROXY_PORT: 1080

jobs:
  build:    
    runs-on: ubuntu-22.04
    steps:    
    
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
          root-reserve-mb: 2048
          temp-reserve-mb: 512
          swap-size-mb: 1024
          build-mount-path: /workdir
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'
          
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
        sudo -E apt-get -qq update
        sudo apt install -y perl build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-pip rsync bc wget ccache flex bison libelf-dev jq parallel pigz
        sudo -E apt-get -qq clean
        sudo timedatectl set-timezone "$TZ"
        sudo chown -R $USER:$GROUPS /workdir
        sudo chown -R $USER:$GROUPS $GITHUB_WORKSPACE
        # 把 pip/Go 缓存重定向到 /workdir，避免写满根分区
        mkdir -p /workdir/pip-cache /workdir/go-cache /workdir/go-mod-cache
        pip install --cache-dir /workdir/pip-cache "tenacity>=8.0.0" "pycryptodome>=3.9.6" "requests" "pathlib" && pip install --cache-dir /workdir/pip-cache "mega.py==1.0.8" --no-deps || exit 1
        echo "GOPATH=/workdir/go-cache" >> $GITHUB_ENV
        echo "GOMODCACHE=/workdir/go-mod-cache" >> $GITHUB_ENV
        echo "GOCACHE=/workdir/go-cache" >> $GITHUB_ENV
      
        
    - name: Clone source code
      working-directory: /workdir
      run: |
        sudo chown -R $USER:$GROUPS /workdir
        df -hT
        
        # 获取 OpenWrt 官方最新稳定版本号
        echo "获取 OpenWrt 官方最新稳定版本..."
        STABLE_VERSION=$(curl -s https://downloads.openwrt.org/releases/ | grep -oP 'href="\K[\d.]+' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
        echo "完整版本号: $STABLE_VERSION"
        
        # 提取主版本号（如 25.12.0 -> 25.12）
        MAJOR_VERSION=$(echo "$STABLE_VERSION" | cut -d'.' -f1,2)
        echo "主版本号: $MAJOR_VERSION"
        
        # 构建分支列表：同时尝试主版本号和完整版本号
        BRANCHES=(
          "main"
          "master"
          "$MAJOR_VERSION"
          "$STABLE_VERSION"
          "openwrt-${MAJOR_VERSION}"
          "openwrt-${STABLE_VERSION}"
        )
        echo "尝试分支列表: ${BRANCHES[*]}"
        
        # 尝试每个分支
        for branch in "${BRANCHES[@]}"; do
          echo "尝试分支: $branch"
          if git clone ${{ env.REPO_URL }} -b "$branch" openwrt 2>/dev/null; then
            echo "成功克隆分支: $branch"
            echo "REPO_BRANCH=$branch" >> $GITHUB_ENV
            break
          else
            echo "分支 $branch 不存在"
            rm -rf openwrt 2>/dev/null || true
          fi
        done
        
        if [ ! -d "openwrt" ]; then
          echo "错误: 所有分支尝试失败"
          exit 1
        fi
        
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update and Install feeds
      run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Apply WiFi configuration
      env:
        WIFI_SSID: ${{ secrets.WIFI_SSID }}
        WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
      run: |
        chmod +x $GITHUB_WORKSPACE/replace_wifi_config.sh
        $GITHUB_WORKSPACE/replace_wifi_config.sh openwrt/files/etc/config/wireless

    - name: Download package
      id: download
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc) V=s
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        
    - name: Check space usage after download
      if: (!cancelled())
      run: df -hT
      
   
    # - name: Modify overclocking settings
    #   run: |
    #     cd openwrt
    #     #超频5.10内核至1000Mhz
    #     mv target/linux/ramips/patches-5.10/322-mt7621-fix-cpu-clk-add-clkdev.patch ./322-mt7621-fix-cpu-clk-add-clkdev.patch.bak
    #     wget -O target/linux/ramips/patches-5.10/322-mt7621-fix-cpu-clk-add-clkdev.patch https://raw.githubusercontent.com/Fatty911/AutoBuild_OpenWRT_for_Mi_R4/main/mt7621_overclocking-322-mt7621-fix-cpu-clk-add-clkdev.patch
    - name: Compile tools
      id: compile_tools
      run: |
        cd openwrt
        make tools/install -j$(nproc) V=s > tools.log 2>&1 || make tools/install -j1 V=s > tools.log 2>&1

    - name: Compile toolchain
      id: compile_toolchain
      run: |
        cd openwrt
        make toolchain/install -j$(nproc) V=s > toolchain.log 2>&1 || make toolchain/install -j1 V=s > toolchain.log 2>&1
        make -j$(nproc) package/feeds/luci/luci-base/compile V=s || make -j$(nproc) package/luci/modules/luci-base/compile V=s || make -j1 package/feeds/luci/luci-base/compile V=s || make -j1 package/luci/modules/luci-base/compile V=s

    - name: Compile kernel
      id: compile_kernel 
      run: |
        cd openwrt
        make target/linux/compile -j$(nproc) V=s > kernel.log 2>&1 || make target/linux/compile -j1 V=s > kernel.log 2>&1

        

    - name: Compile packages by feeds
      id: compile_packages
      run: |
        cd openwrt
        # 逐行读取 feeds.conf.default 并编译
        while IFS= read -r line; do
          [[ -z "$line" || "$line" =~ ^# ]] && continue
          FEED=$(echo "$line" | awk '{print $2}')
          echo "处理 feed: $FEED 于 $(date)"
          # 提取该 feed 下的软件包
          PACKAGES=$(ls package/feeds/$FEED 2>/dev/null | grep -v Makefile || true)
          if [ -z "$PACKAGES" ]; then
            echo "警告: $FEED 下没有找到软件包，跳过"
            continue
          fi
          for pkg in $PACKAGES; do
            echo "编译软件包: $pkg 于 $(date)"
            if make package/$pkg/compile -j2 V=s > packages.log 2>&1 || make package/$pkg/compile -j1 V=s > packages.log 2>&1; then
              echo "软件包 $pkg 编译成功"
            else
              retry_count=$((retry_count + 1))
              echo "尝试第 $retry_count 次修复..."
              if grep -q "PKG_VERSION.*error" packages.log; then
                echo "Fixing PKG_VERSION formats..."
                find . -type f \( -name "Makefile" -o -name "*.mk" \) | while read -r makefile; do
                  if grep -q "PKG_VERSION:=.*\..*\..*-[0-9]\+" "$makefile" && ! grep -q "PKG_RELEASE:=" "$makefile"; then
                    echo "Found target in $makefile"
                    sed -i.bak -E 's/PKG_VERSION:=([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)/PKG_VERSION:=\1\nPKG_RELEASE:=\2/' "$makefile" || exit 1
                    echo "已修改$makefile:"
                    grep -E "PKG_VERSION|PKG_RELEASE" "$makefile"
                  fi
                done
              elif grep -q "DEPENDS.*error" packages.log; then
                echo "Fixing dependency duplicates..."
                find . -type f \( -name "Makefile" -o -name "*.mk" \) -exec sh -c '
                  makefile="$1"
                  awk '\''BEGIN { FS = "[[:space:]]+" }
                  /^[[:space:]]*(DEPENDS|EXTRA_DEPENDS|LUCI_DEPENDS|LUCI_EXTRA_DEPENDS):=/ {
                      split($0, deps, " ")
                      seen_versioned = ""
                      seen_bare = ""
                      result = $1
                      for (i = 2; i <= length(deps); i++) {
                          dep = deps[i]
                          if (dep ~ /\$\(/) {
                              result = result " " dep
                          }
                      }
                          print result
                  }'\'' "$makefile" > "$makefile.tmp" && mv "$makefile.tmp" "$makefile"
                ' sh {} \;
              fi
            fi
          done
          echo "Feed $FEED 编译完成 于 $(date)"
        done < feeds.conf.default
        
    - name: List main packages
      run: |
        cd openwrt
        # Find directories with Makefiles, excluding package/feeds/
        find package/ -type d -name src -prune -o -type f -name Makefile -not -path 'package/feeds/*' -exec dirname {} \; > main_packages.txt
        echo "Main packages to compile:"
        cat main_packages.txt
    
    - name: Compile main packages
      id: main_packages
      run: |
        cd openwrt
        while read -r pkg; do
          echo "编译 $pkg at $(date)"
          # Compile each package individually, redirect output to a log file
          { make $pkg/compile -j2 V=s > "$pkg.log" 2>&1 && echo "在$(date) 成功编译 $pkg ";} || { make $pkg/compile -j1 V=s > "$pkg.log" 2>&1 && echo "在$(date) 成功编译 $pkg ";} || {
            echo "编译 $pkg 失败，查看编译此包时的日志"
            cat "$pkg.log"
            }
        done < main_packages.txt
    
    - name: 查看日志结尾300行
      if: always()
      run: |
        cd openwrt
        if [ "${{ steps.compile_tools.outcome }}" = "failure" ]; then             
          echo "Compile tools failed. Showing last 300 lines of tools.log:"             
          tail -300 tools.log           
        elif [ "${{ steps.compile_toolchain.outcome }}" = "failure" ]; then             
          echo "Compile toolchain failed. Showing last 300 lines of toolchain.log:"             
          tail -300 toolchain.log           
        elif [ "${{ steps.compile_kernel.outcome }}" = "failure" ]; then             
          echo "Compile kernel failed. Showing last 300 lines of kernel.log:"             
          tail -300 kernel.log           
        elif [ "${{ steps.compile_packages.outcome }}" = "failure" ]; then             
          echo "Compile packages failed. Showing last 300 lines of packages.log:"             
          tail -300 packages.log  
        # elif [ "${{ steps.build_image.outcome }}" = "failure" ]; then             
        #   echo "Build image failed. Showing last 300 lines of image.log:"             
        #   tail -300 image.log           
        else             
          echo "All steps completed successfully. No log to show."           
        fi 


    - name: 归档
      run: |
        echo "归档前清理..."
        cd /workdir/openwrt
        rm -f *.log
        rm -rf dl tmp .git
        rm -rf build_dir/host build_dir/hostpkg-*
        rm -rf staging_dir/host staging_dir/hostpkg
        find build_dir/target-* -name "*.o" -delete 2>/dev/null || true
        find build_dir/target-* -name "*.a" -delete 2>/dev/null || true
        echo "归档前磁盘空间："
        df -hT
        cd /workdir
        tar -cf - openwrt/ | pigz > ${{ env.SOURCE }}.tar.gz
        
        # 检查归档是否成功
        if [ ! -f "${{ env.SOURCE }}.tar.gz" ]; then
          echo "::error::归档失败，未创建 ${{ env.SOURCE }}.tar.gz"
          exit 1
        fi
        
        FILE_SIZE=$(stat -c%s "${{ env.SOURCE }}.tar.gz" 2>/dev/null || stat -f%z "${{ env.SOURCE }}.tar.gz" 2>/dev/null)
        if [ "$FILE_SIZE" -lt 1000000 ]; then
          echo "::error::归档文件太小 (${FILE_SIZE} bytes)，可能损坏"
          exit 1
        fi
        
        echo "归档后磁盘空间："
        df -hT
        ls -lh ${{ env.SOURCE }}.tar.gz
        # 保持文件在 /workdir，避免占用根分区空间
    
    
    - name: Upload to MEGA
      working-directory: /workdir
      env:
        MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
        MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
      run: |
        # 检查文件是否存在
        if [ ! -f "${{ env.SOURCE }}.tar.gz" ]; then
          echo "::error::归档文件 ${{ env.SOURCE }}.tar.gz 不存在"
          exit 1
        fi
        
        echo "准备上传文件:"
        ls -lh ${{ env.SOURCE }}.tar.gz
        
        # 上传到 MEGA
        python $GITHUB_WORKSPACE/upload_to_MEGA.py
        
        # 标记MEGA上传成功
        echo "MEGA_UPLOAD_SUCCESS=true" >> $GITHUB_ENV
        echo "MEGA 上传成功"

    - name: Validate build output
      run: |
        python $GITHUB_WORKSPACE/validate_build_output.py
        
    - name: Auto fix with MiniMax AI on failure
      if: failure()
      env:
        ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
        MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        MINIMAX_MODEL_LIST: ${{ secrets.MINIMAX_MODEL_LIST }}
        ACTIONS_TRIGGER_PAT: ${{ secrets.ACTIONS_TRIGGER_PAT }}
        WORKFLOW_FILE: .github/workflows/Build_Lienol_OpenWrt_1_for_XIAOMI_R4.yml
      run: |
        pip install requests --quiet || true
        python auto_fix_with_AI_LLM.py

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 2
