name: test_upload_to_MEGA.yml
on:
  push:
    branches:
      - main
      - master
    paths:
      - .github/workflows/test_upload_to_MEGA.yml
      - upload_to_MEGA.py
      - download_from_MEGA.py
  workflow_dispatch:


env:
  ACTIONS_STEP_DEBUG: true
  SOURCE: coolsnowwolf

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo apt -y install python3-pip
          pip install mega.py || pip3 install mega.py || exit 1

      - name: 生成测试文件
        run: |
          mkdir openwrt
          tar -cf - openwrt/ | pigz > ${{ env.SOURCE }}.tar.gz
          pwd && ls -la "${{ env.SOURCE }}.tar.gz"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@main
        with:
          name: mega-test-tarball
          path: ${{ env.SOURCE }}.tar.gz

  upload:
    needs: prepare
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo apt -y install python3-pip
          pip install mega.py || pip3 install mega.py || exit 1

      - name: Download tarball artifact
        uses: actions/download-artifact@main
        with:
          name: mega-test-tarball
          path: .

      - name: Upload to MEGA
        env:
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          ls -la "${{ env.SOURCE }}.tar.gz"
          python upload_to_MEGA.py
