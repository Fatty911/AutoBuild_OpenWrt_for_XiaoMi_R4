name: Build coolsnowwolf-LEDE Full for XIAOMI_R4

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'custom_scripts/**'
      - 'custom_configs/**'
      - .github/workflows/Build_coolsnowwolf-LEDE-full_for_XIAOMI_R4.yml
      - package/luci-app-autoupdate/**
      - custom_scripts/select_kernel.py
  repository_dispatch:
    types: coolsnowwolf Source Code Update
  workflow_dispatch:
    inputs:
      tmate_debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: true
        default: false

concurrency:
  group: coolsnowwolf-full
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom_configs/config_for_coolsnowwolf
  DIY_P1_SH: custom_scripts/diy-part1.sh
  DIY_P2_SH: custom_scripts/diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  ACTIONS_STEP_DEBUG: true
  SOURCE: coolsnowwolf
  KERNEL_SELECTOR_PY: custom_scripts/select_kernel.py # Define script name

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          temp-reserve-mb: 512
          swap-size-mb: 1024
          build-mount-path: /workdir
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout
        uses: actions/checkout@main

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo -E apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* mongodb* moby* snap* || true
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install python-is-python3 parallel cpulimit libpam0g-dev liblzma-dev libsnmp-dev gcc g++ build-essential asciidoc binutils bzip2 gawk gettext git libncurses5-dev libz-dev patch flex bison make autoconf texinfo unzip sharutils subversion ncurses-term zlib1g-dev ccache upx lib32gcc-s1 libc6-dev-i386 uglifyjs git-core gcc-multilib p7zip p7zip-full msmtp libssl-dev libglib2.0-dev xmlto qemu-utils automake libtool pigz
          sudo -E apt-get -qq install libcrypto++-dev qtbase5-dev qtbase5-dev-tools qtchooser qt5-qmake qtbase5-private-dev libqt5sql5 libqt5sql5-mysql libqt5sql5-odbc libqt5sql5-psql libqt5sql5-sqlite libqt5sql5-tds qttools5-dev-tools
          UBUNTU_VERSION=$(lsb_release -rs)
          if [[ $UBUNTU_VERSION == 20.04 ]]; then
              sudo apt-get -y install lib32gcc1
          elif [[ $UBUNTU_VERSION == 22.04 ]]; then
              sudo apt-get -y install lib32gcc-s1
          else
              sudo apt-get -y install lib32gcc-s1
              echo "非Ubuntu20.04或22.04系统，安装lib32gcc可能失败，如果失败请检查对应系统安装libgcc32的命令"
          fi
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo rm -rf /var/cache/apt/archives/* /var/lib/apt/lists/*
          sudo apt -y install python3-pip
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R $USER:$GROUPS /workdir
          sudo chown -R $USER:$GROUPS $GITHUB_WORKSPACE
          mkdir -p /workdir/pip-cache /workdir/go-cache /workdir/go-mod-cache
          pip install --cache-dir /workdir/pip-cache "tenacity>=8.0.0" "pycryptodome>=3.9.6" "requests" || true
          curl -L https://mega.nz/MEGAcmd/MEGAcmd_latest_amd64.deb -o /tmp/megacmd.deb
          sudo apt install -y /tmp/megacmd.deb || sudo dpkg -i /tmp/megacmd.deb || (sudo apt-get install -f -y && sudo dpkg -i /tmp/megacmd.deb)
          rm -f /tmp/megacmd.deb
          echo "GOPATH=/workdir/go-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=/workdir/go-mod-cache" >> $GITHUB_ENV
          echo "GOCACHE=/workdir/go-cache" >> $GITHUB_ENV
          df -hT
      
      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT $PWD
          sudo chown -R $USER:$GROUPS /workdir
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds and Install feeds
        run: cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: Apply WiFi configuration
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          chmod +x $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh
          $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh openwrt/files/etc/config/wireless

      - name: Select Kernel Version
        id: select_kernel
        run: |
          if [ -f "$GITHUB_WORKSPACE/$KERNEL_SELECTOR_PY" ]; then
            # Run the script relative to the workspace, it will cd into openwrt internally
            python $GITHUB_WORKSPACE/$KERNEL_SELECTOR_PY
            echo "kernel_selection_done=true" >> $GITHUB_OUTPUT
          else
            echo "Warning: Kernel selector script '$KERNEL_SELECTOR_PY' not found. Skipping kernel selection."
            echo "kernel_selection_done=false" >> $GITHUB_OUTPUT
          fi
          
      - name: Download package
        id: package
        run: |
          cd openwrt
          make defconfig
          make download -j2 || make download -j1
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Check space usage after download
        if: (!cancelled())
        run: df -hT


      - name: Compile tools
        run: |
          cd openwrt
          make tools/install -j2 V=s > tools.log 2>&1 || make tools/install -j1 V=s > tools.log 2>&1 || {
            LOG_TAIL=$(tac tools.log | awk '/Entering directory/{count++} count==3{exit}1' | tac)
            [ -z "$LOG_TAIL" ] && LOG_TAIL=$(tail -n 100 tools.log)
            echo "编译错误日志摘要："
            echo "$LOG_TAIL"
            exit 1
          }

      - name: Compile toolchain
        id: compile_toolchain
        run: |
          cd openwrt
          set +e
          make toolchain/install -j2 V=s > toolchain.log 2>&1 || make toolchain/install -j1 V=s > toolchain.log 2>&1 || {
            LOG_TAIL=$(tac toolchain.log | awk '/Entering directory/{count++} count==3{exit}1' | tac)
            [ -z "$LOG_TAIL" ] && LOG_TAIL=$(tail -n 100 toolchain.log)
            echo "编译错误日志摘要："
            echo "$LOG_TAIL"
            exit 1
          }

      - name: Compile kernel
        run: |
          cd openwrt
          make target/linux/compile -j2 V=s > kernel.log 2>&1 || make target/linux/compile -j1 V=s > kernel.log 2>&1 || {
            LOG_TAIL=$(tac kernel.log | awk '/Entering directory/{count++} count==3{exit}1' | tac)
            [ -z "$LOG_TAIL" ] && LOG_TAIL=$(tail -n 100 kernel.log)
            echo "编译错误日志摘要："
            echo "$LOG_TAIL"
            exit 1
          }
      - name: 编译Luci-base
        run: |
          cd openwrt
          make -j$(nproc) package/feeds/luci/luci-base/compile V=s || make -j1 package/feeds/luci/luci-base/compile V=s

      - name: Compile  Batman-adv
        id: compile_batman_1
        run: |
          cd openwrt
          make -j2 package/feeds/routing/batman-adv/compile V=s 

      - name: Compile the firmware
        id: compile
        run: |
          cd openwrt
          make -j2 V=s || python $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py "make -j2 V=s" "compile.log" || python $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py "make -j1 V=s" "compile.log"
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          TARGET_BOARD=$(grep '^CONFIG_TARGET_BOARD=' .config | sed -r 's/.*="(.*)"/\1/')
          echo "TARGET_BOARD=$TARGET_BOARD" >> $GITHUB_ENV
          TARGET_SUBTARGET=$(grep '^CONFIG_TARGET_SUBTARGET=' .config | sed -r 's/.*="(.*)"/\1/')
          echo "TARGET_SUBTARGET=$TARGET_SUBTARGET" >> $GITHUB_ENV
          TARGET_PROFILE=$(grep '^CONFIG_TARGET_PROFILE=' .config | sed -r 's/.*="(.*)"/\1/' | sed 's/^DEVICE_//')
          echo "TARGET_PROFILE=$TARGET_PROFILE" >> $GITHUB_ENV
          echo "DEVICE_NAME=$TARGET_PROFILE" >> $GITHUB_ENV
          KERNEL_VERSION=$(ls build_dir/target-*_*/linux-*/ | grep -oP 'linux-\K\d+\.\d+\.\d+')
          echo "kernel_version=$KERNEL_VERSION" >> $GITHUB_ENV

      - name: Check space usage after compile
        if: (!cancelled())
        run: df -hT
        
      - name: Organize files
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/${{ env.TARGET_BOARD }}/${{ env.TARGET_SUBTARGET }}
          rm -rf packages
          ls -lh
          echo "firmware_path=$(pwd)" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT      
          



      - name: Check for .bin files
        id: check_bin
        if: steps.organize.outputs.status == 'success' && !cancelled()
        run: |
          echo "Check File Sizes..."
          ls -lh openwrt/bin/targets/*/*
          BIN_COUNT=$(ls openwrt/bin/targets/*/*.bin 2>/dev/null | grep -v initramfs | wc -l)
          if [ "$BIN_COUNT" -eq 0 ]; then
            echo "No .bin files found in firmware_path (excluding initramfs)."
            echo "FINAL_BIN_EXISTS=false" >> $GITHUB_ENV
            echo "check_bin_exist=false" >> $GITHUB_OUTPUT
          else
            echo "FINAL_BIN_EXISTS=true" >> $GITHUB_ENV
            echo "check_bin_exist=success" >> $GITHUB_OUTPUT
          fi
          
      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@v3
      #   if: ${{ github.event_name == 'workflow_dispatch' && inputs.tmate_debug_enabled }} || ${{ failure() }} || ${{ steps.check_bin.outputs.check_bin_exist == 'false' }} 
      #   with:
      #     limit-access-to-actor: false 
      #       #设为false即为通过链接可直接访问，设为true得保存密钥比较麻烦
      #     timeout-minutes: 300
          
      - name: Upload bin directory
        id: upload
        uses: actions/upload-artifact@main
        if: steps.check_bin.outputs.check_bin_exist == 'success'
        with:
          name: OpenWrt_LEDE_coolsnowwolf_bin_${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_${{ env.FILE_DATE }}
          path: |
            openwrt/bin
            openwrt/.config

      - name: Rename
        id: rename
        if: steps.check_bin.outputs.check_bin_exist == 'success'
        run: |
          cd openwrt/bin/targets/${{ env.TARGET_BOARD }}/${{ env.TARGET_SUBTARGET }}
          
          for file in openwrt-${{ env.TARGET_BOARD }}-${{ env.TARGET_SUBTARGET }}-${{ env.TARGET_PROFILE}}-*; do
            if [ -f "$file" ]; then
              new_file="openwrt_${{ env.SOURCE }}_${{ env.TARGET_BOARD }}_${{ env.TARGET_SUBTARGET }}_${{ env.TARGET_PROFILE}}_Kernel_${{ env.kernel_version }}_${{ env.FILE_DATE }}${file#*${{ env.TARGET_PROFILE}}}"
              #${file#*${{ env.TARGET_PROFILE}}}: 这是 Shell 参数扩展（Parameter Expansion）的用法。
              # #: 表示从变量 $file 的 开头 删除最短匹配项。
              # *${{ env.TARGET_PROFILE}}: 表示匹配任何字符 (*) 直到 ${{ env.TARGET_PROFILE}} 的值结束。
              # 效果: 它会删除原始文件名中从开头到 ${{ env.TARGET_PROFILE}}（包含该profile名）的部分。
              # 例如，如果原始文件名是 openwrt-ramips-mt7621-xiaomi_mi-router-3g-squashfs-sysupgrade.bin 且 ${{ env.TARGET_PROFILE}} 是 xiaomi_mi-router-3g，
              # 那么这部分会得到 -squashfs-sysupgrade.bin（注意保留了 profile 名后面的连字符 - 和后续的文件类型/后缀）。
              mv "$file" "$new_file"
              echo "Renamed $file to $new_file"
            fi
          done

      - name: Upload firmware directory
        uses: actions/upload-artifact@master
        if: steps.check_bin.outputs.check_bin_exist == 'success'
        with:
          name: OpenWrt_LEDE_coolsnowwolf_firmware_${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_${{ env.FILE_DATE }}
          path: ${{ env.firmware_path }}


      - name: Cleanup invalid releases (no .bin)
        if: env.FINAL_BIN_EXISTS == 'false'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "没有找到 .bin 固件，清理可能存在的无效 Release..."
          python $GITHUB_WORKSPACE/custom_scripts/clean_invalid_releases.py || echo "清理脚本执行失败或不存在，跳过"

      - name: Build Quality Gate
        id: build_quality_gate
        run: |
          python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py --gate
        env:
          SOURCE: ${{ env.SOURCE }}

      - name: Generate release tag
        id: generate_release_tag
        if: env.BUILD_QUALITY_GATE == 'pass' && env.FINAL_BIN_EXISTS == 'true'
        run: |
          echo "release_tag=${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          echo "release_tag_status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        id: up-release
        uses: softprops/action-gh-release@master
        if: env.BUILD_QUALITY_GATE == 'pass' && env.FINAL_BIN_EXISTS == 'true' && steps.generate_release_tag.outputs.release_tag_status == 'success'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          token: ${{ github.token }}
          files: |
            openwrt/bin/targets/**/*.bin
          name: OpenWRT_LEDE_coolsnowwolf_${{ steps.generate_release_tag.outputs.release_tag }}
          tag_name: OpenWRT_LEDE_coolsnowwolf_${{ steps.generate_release_tag.outputs.release_tag }}
          
          
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2

      - name: Validate build output
        run: |
          python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py

      - name: Extract Error Log
        if: failure()
        run: |
          python $GITHUB_WORKSPACE/custom_scripts/extract_last_error.py --output last_error.log --max-chars 15000

      - name: Upload Error Log Artifact
        if: failure()
        uses: actions/upload-artifact@main
        with:
          name: error-log
          path: last_error.log
          retention-days: 7

      - name: Auto fix with AI on failure
        if: failure()
        env:
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL_LIST: ${{ secrets.OPENROUTER_MODEL_LIST }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_PROXY_URL: ${{ secrets.XAI_PROXY_URL }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_MODEL_LIST: ${{ secrets.MINIMAX_MODEL_LIST }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ATOMGIT_MODEL_LIST: ${{ secrets.ATOMGIT_MODEL_LIST }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          MODELSCOPE_MODEL_LIST: ${{ secrets.MODELSCOPE_MODEL_LIST }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_MODEL_LIST: ${{ secrets.SILICONFLOW_MODEL_LIST }}
          GLM_PROXY_URL: ${{ secrets.GLM_PROXY_URL }}
          CLAUDE_PROXY_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          CLAUDE_PROXY_API_KEY: ${{ secrets.CLAUDE_PROXY_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
          MODAL_MODEL_LIST: ${{ secrets.MODAL_MODEL_LIST }}
          ACTIONS_TRIGGER_PAT: ${{ secrets.ACTIONS_TRIGGER_PAT }}
          WORKFLOW_FILE: .github/workflows/Build_coolsnowwolf-LEDE-full_for_XIAOMI_R4.yml
        run: |
          pip install requests --quiet || true
          python custom_scripts/auto_fix_with_AI_LLM.py

      - name: Delete Older Releases
        uses: dev-drprasad/delete-older-releases@master
        with:
          keep_latest: 3
          delete_tag_pattern: .*${{ env.SOURCE }}.*
        env:
          GITHUB_TOKEN: ${{ github.token }}
              
