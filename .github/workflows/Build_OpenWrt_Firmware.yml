name: Build OpenWrt Firmware for Xiaomi Mi Router 4

on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled'
        required: true
        default: false
  push:
    branches:
      - main
      - master
    paths:
      - 'custom_scripts/diy-part1.sh'
      - 'custom_scripts/diy-part2.sh'
      - 'custom_scripts/compile_with_retry.py'
      - 'custom_scripts/extract_last_error.py'
      - 'custom_scripts/validate_build_output.py'
      - 'custom_scripts/fix_dts_nvmem_layout.py'
      - 'custom_scripts/select_kernel.py'
      - 'custom_configs/**'
      - '.github/workflows/Build_OpenWrt_Firmware.yml'
      - 'package/luci-app-autoupdate/**'
  repository_dispatch:
    types: Openwrt.org Source Code Update

concurrency:
  group: build-openwrt-firmware
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom_configs/config_for_OpenWrt_org
  DIY_P1_SH: custom_scripts/diy-part1.sh
  DIY_P2_SH: custom_scripts/diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  SOURCE: OpenWrt.org_official
  AUTOPDATE_GITHUB_REPO: Fatty911/AutoBuild_OpenWrt_for_XiaoMi_R4
  AUTOPDATE_WORKFLOW: OpenWRT.org
  AUTOPDATE_SUBSCRIPTION: ${{ secrets.SUBSCRIPTION_URL }}
  AUTOPDATE_PROXY_PORT: 1080

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@fc881a613ad2a34aca9c9624518214ebc21dfc0c
        with:
          root-reserve-mb: 4096
          temp-reserve-mb: 1024
          swap-size-mb: 1024
          build-mount-path: /workdir
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}

      - name: Cache APT packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/Build_OpenWrt_Firmware.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-
          save-always: false

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -y purge azure-cli* docker* ghc* llvm*
          sudo sed -i 's/^# deb/deb/g' /etc/apt/sources.list || true
          sudo -E apt-get -qq update
          sudo apt install software-properties-common -y || true
          sudo add-apt-repository universe || true
          sudo add-apt-repository multiverse || true
          sudo apt update
          sudo apt install -y perl build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-distutils rsync bc wget ccache flex bison libelf-dev || sudo apt install -y flex bison libelf-dev build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-venv python3-pip rsync bc wget ccache perl || sudo apt policy build-essential git gettext subversion ccache python3-distutils
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R $USER:$GROUPS /workdir
          sudo apt install -y jq parallel python3-pip pigz
          echo "GOPATH=/workdir/go-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=/workdir/go-mod-cache" >> $GITHUB_ENV
          echo "GOCACHE=/workdir/go-cache" >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-${{ hashFiles(env.CONFIG_FILE, env.DIY_P1_SH, env.DIY_P2_SH) }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-
          save-always: false

      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT
          sudo chown -R $USER:$GROUPS /workdir
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds and Install feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Compute source fingerprint
        id: source_fingerprint
        run: |
          cd openwrt
          source_rev="$(git rev-parse HEAD)"
          feeds_rev="$(
            for feed in feeds/*; do
              [ -d "$feed/.git" ] || continue
              printf '%s %s\n' "$(basename "$feed")" "$(git -C "$feed" rev-parse HEAD)"
            done | sort | sha256sum | awk '{print $1}'
          )"
          echo "source_rev=$source_rev" >> "$GITHUB_OUTPUT"
          echo "feeds_rev=$feeds_rev" >> "$GITHUB_OUTPUT"

      - name: Cache OpenWRT dl directory
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-dl
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/feeds.conf.default', env.CONFIG_FILE, env.DIY_P1_SH) }}
          restore-keys: |
            ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-
          save-always: false

      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH
          echo "Before defconfig, setting CONFIG_TARGET_ROOTFS_PARTSIZE:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || echo "CONFIG_TARGET_ROOTFS_PARTSIZE=110" >> .config
          make defconfig
          echo "After defconfig, checking CONFIG_TARGET_ROOTFS_PARTSIZE:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || (echo "Lost after defconfig, reapplying..." && echo "CONFIG_TARGET_ROOTFS_PARTSIZE=110" >> .config)
          echo "Final check after reapplication:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config

      - name: Cache OpenWRT staging_dir
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        id: cache-build
        with:
          path: |
            openwrt/staging_dir
          key: ${{ runner.os }}-build-${{ steps.source_fingerprint.outputs.source_rev }}-${{ steps.source_fingerprint.outputs.feeds_rev }}-${{ hashFiles('openwrt/.config', env.DIY_P1_SH, env.DIY_P2_SH) }}
          save-always: false

      - name: Download package
        id: download_package
        run: |
          cd openwrt
          make download -j4
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Check space usage after download
        if: (!cancelled())
        run: df -hT

      - name: Compile tools and toolchain
        id: compile_tools
        env:
          TERM: dumb
        run: |
          cd openwrt
          make tools/install -j$(nproc) V=s > tools.log 2>&1 || make tools/install -j1 V=s > tools.log 2>&1
          make toolchain/install -j$(nproc) V=s > toolchain.log 2>&1 || make toolchain/install -j1 V=s > toolchain.log 2>&1

      - name: Compile kernel
        id: compile_kernel
        run: |
          cd openwrt
          make target/linux/compile -j$(nproc) V=s > kernel.log 2>&1 || make target/linux/compile -j1 V=s > kernel.log 2>&1

      - name: Pre-compile luci-base
        run: |
          cd openwrt
          echo "=== 预编译 luci-base ==="
          make -j$(nproc) package/feeds/luci/luci-base/compile V=s || make -j$(nproc) package/luci/modules/luci-base/compile V=s || make -j1 package/feeds/luci/luci-base/compile V=s || make -j1 package/luci/modules/luci-base/compile V=s || true

      - name: Pre-compile libnl-tiny
        run: |
          cd openwrt
          echo "=== 预编译 libnl-tiny ==="
          if [ ! -f "staging_dir/target-mipsel_24kc_musl/usr/lib/libnl-tiny.so" ]; then
            echo "libnl-tiny 未找到，正在尝试重新编译..."
            make package/libs/libnl-tiny/clean V=s
            make package/libs/libnl-tiny/compile V=s -j1
          else
            echo "libnl-tiny 已存在，路径：staging_dir/target-mipsel_24kc_musl/usr/lib/libnl-tiny.so"
          fi
          echo "确保 libnl-tiny 被正确安装"
          make package/libs/libnl-tiny/compile V=s -j1

      - name: Base-files fix
        run: |
          cd openwrt
          echo "=== 修复 base-files 版本 (APK 兼容性) ==="
          sed -i 's/PKG_RELEASE:=$(COMMITCOUNT)/PKG_RELEASE:=1/' package/base-files/Makefile || true
          find staging_dir -name 'base-files.version' -delete 2>/dev/null || true
          rm -rf build_dir/target-*/base-files/ build_dir/target-*/linux-*/base-files/ 2>/dev/null || true
          rm -f tmp/.packageinfo-base-files tmp/apk_install_list 2>/dev/null || true
          echo "base-files APK 版本格式修复完成"

      - name: Ensure python-installer is built first
        run: |
          cd openwrt
          echo "=== 确保 python-installer 在 python-packaging 之前编译 ==="
          if [ -d "feeds/packages/lang/python/python-installer" ]; then
            echo "编译 python-installer host package..."
            make package/feeds/packages/python-installer/host-compile V=s || \
              make package/feeds/packages/python-installer/compile V=s || \
              echo "python-installer 编译失败，但继续尝试后续编译"
          else
            echo "feeds/packages/lang/python/python-installer 目录不存在，跳过"
          fi
          echo "python-installer 优先编译步骤完成"

      - name: Compile packages
        run: |
          cd openwrt
          echo "=== 开始编译 packages 部分 ==="
          make package/compile -j$(nproc) V=s > packages.log 2>&1 || {
            echo "首次编译 packages 失败，尝试运行修复脚本..."
            python $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py --max-retry 1 "make package/compile V=s" "packages.log"
          }
          echo "=== packages 编译步骤结束 ==="

      - name: Build full firmware image
        run: |
          cd openwrt
          echo "=== 开始完整固件编译 ==="
          if ! make -j$(nproc) V=s; then
            make package/feeds/packages/kmod/clean V=s || make package/kmod/clean V=s || true
            rm -rf build_dir/target-mipsel_24kc_musl/kmod-32 2>/dev/null || true
            make -j1 V=s || python $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py --max-retry 1 "make -j1 V=s" "compile.log"
          fi
          echo "=== 固件编译结束 ==="
          ls -la bin/targets/*/ 2>/dev/null || true

      - name: Set environment variables
        id: setEnv
        run: |
          cd openwrt
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "TARGET_BOARD=$(grep '^CONFIG_TARGET_BOARD=' .config | sed -r 's/.*="(.*)"/\1/')" >> $GITHUB_ENV
          echo "TARGET_SUBTARGET=$(grep '^CONFIG_TARGET_SUBTARGET=' .config | sed -r 's/.*="(.*)"/\1/')" >> $GITHUB_ENV
          echo "TARGET_PROFILE=$(grep '^CONFIG_TARGET_PROFILE=' .config | sed -r 's/.*="(.*)"/\1/' | sed 's/^DEVICE_//')" >> $GITHUB_ENV
          KERNEL_VERSION=$(ls build_dir/target-*_*/linux-*/ | grep -oP 'linux-\K\d+\.\d+\.\d+' | head -1)
          echo "kernel_version=$KERNEL_VERSION" >> $GITHUB_ENV
          echo "DEVICE_NAME=$TARGET_PROFILE" >> $GITHUB_ENV

      - name: Check for .bin file
        id: check_bin
        run: |
          cd openwrt
          echo "=== 检查 Xiaomi Mi Router 4 sysupgrade 固件是否存在 ==="
          SYSUPGRADE_IMAGE="$(find bin/targets/ramips/mt7621 -maxdepth 1 -type f -name '*mi-router-4*sysupgrade*.bin' -print -quit)"
          if [ -z "$SYSUPGRADE_IMAGE" ]; then
            echo "::error::没有找到 Xiaomi Mi Router 4 sysupgrade.bin"
            echo "BIN_EXISTS=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo "找到 sysupgrade 固件: $SYSUPGRADE_IMAGE"
          echo "SYSUPGRADE_IMAGE=$SYSUPGRADE_IMAGE" >> "$GITHUB_ENV"
          echo "BIN_EXISTS=true" >> $GITHUB_OUTPUT

      - name: Build Quality Gate
        id: build_quality_gate
        env:
          SOURCE: ${{ env.SOURCE }}
          EXPECTED_TARGET_DIR: ramips/mt7621
          EXPECTED_DEVICE_PATTERN: mi-router-4
          MIN_FIRMWARE_SIZE_MB: 8
        run: |
          python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py --gate

      - name: Upload firmware artifact
        if: steps.check_bin.outputs.BIN_EXISTS == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: OpenWrt.org_${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_${{ env.FILE_DATE }}
          path: |
            openwrt/bin
            openwrt/.config

      - name: Generate release tag
        id: generate_release_tag
        if: steps.check_bin.outputs.BIN_EXISTS == 'true' && env.BUILD_QUALITY_GATE == 'pass'
        run: |
          echo "release_tag=OpenWRT.org_${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          echo "release_tag_status=success" >> $GITHUB_OUTPUT

      - name: Upload firmware to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        if: steps.generate_release_tag.outputs.release_tag_status == 'success'
        with:
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
          files: openwrt/bin/targets/**/*.bin
          name: ${{ steps.generate_release_tag.outputs.release_tag }}
          tag_name: ${{ steps.generate_release_tag.outputs.release_tag }}

      - name: Cleanup old releases
        if: steps.generate_release_tag.outputs.release_tag_status == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Only delete releases created by this workflow (matching tag prefix)
          TAG_PREFIX="OpenWRT.org_${{ env.DEVICE_NAME }}_Kernel_"
          python3 custom_scripts/cleanup_releases.py --prefix "$TAG_PREFIX" --keep 3

      - name: Validate build output
        if: success()
        env:
          SOURCE: ${{ env.SOURCE }}
        run: python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py

      - name: Extract Error Log
        if: failure()
        run: |
          cd $GITHUB_WORKSPACE
          python custom_scripts/extract_last_error.py --log-dir openwrt --output last_error.log --max-chars 8000 || true
          if [ ! -s last_error.log ]; then
            echo "extract_last_error.py 未生成有效日志，创建兜底日志..."
            echo "=== 兜底错误日志 ===" > last_error.log
            echo "提取脚本失败或日志目录不存在。请检查上游编译步骤的失败输出。" >> last_error.log
            for f in openwrt/*.log; do
              if [ -f "$f" ]; then
                echo "" >> last_error.log
                echo "=== $f (last 100 lines) ===" >> last_error.log
                tail -n 100 "$f" >> last_error.log
              fi
            done
          fi

      - name: Upload Error Log Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: failure()
        with:
          name: error-log
          path: last_error.log
          retention-days: 1

      - name: Delete workflow runs
        if: always()
        run: |
          echo "Workflow runs are cleaned up centrally by cleanup-workflow-runs.yml"
          echo "This workflow keeps the latest 2 successful and 2 failed runs"
          echo "Daily cleanup runs at 3 AM UTC (11 AM China time)"
