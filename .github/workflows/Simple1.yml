name: Simple 1 Build OpenWRT.org 1 before transplant for XIAOMI_R4

on:
  repository_dispatch:
    types: Openwrt.org Source Code Update
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: true
        default: false
  push:
    branches: 
      - master
      - main
    paths:
      - .github/workflows/Simple1.yml
      - custom_configs/config_for_OpenWrt_org
      - custom_scripts/diy-part1.sh
      - custom_scripts/diy-part2.sh
      - package/luci-app-autoupdate/**

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom_configs/config_for_OpenWrt_org
  DIY_P1_SH: custom_scripts/diy-part1.sh
  DIY_P2_SH: custom_scripts/diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  SOURCE: OpenWrt.org_official

jobs:
  build:
    runs-on: ubuntu-22.04
    outputs:
      mega_upload: ${{ steps.build_job_outputs.outputs.mega_upload }}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
            root-reserve-mb: 2048
            temp-reserve-mb: 256
            swap-size-mb: 1024
            build-mount-path: /workdir
            remove-dotnet: 'true'
            remove-android: 'true'
            remove-haskell: 'true'
            remove-codeql: 'true'
            remove-docker-images: 'true'
            
      - name: Checkout
        uses: actions/checkout@main
            
      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
          sudo -E apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* mongodb* moby* snap* || true
          sudo -E apt-get -qq update
          sudo apt install -y perl build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-pip rsync bc wget ccache flex bison libelf-dev jq parallel pigz
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo rm -rf /var/cache/apt/archives/* /var/lib/apt/lists/*
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R $USER:$GROUPS /workdir
          mkdir -p /workdir/pip-cache /workdir/ccache
          pip install --cache-dir /workdir/pip-cache "tenacity>=8.0.0" "pycryptodome>=3.9.6" "requests" "pathlib" && pip install --cache-dir /workdir/pip-cache "mega.py==1.0.8" --no-deps || exit 1
          echo "CCACHE_DIR=/workdir/ccache" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          df -hT


      # - name: Cache ccache
      #   uses: actions/cache@main
      #   with:
      #     path: ${{ github.workspace }}/.ccache
      #     key: ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-${{ hashFiles(env.CONFIG_FILE, env.DIY_P1_SH, env.DIY_P2_SH) }}
      #     restore-keys: |
      #       ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-
      #     save-always: false

            
      - name: Clone source code
        working-directory: /workdir
        run: |
          sudo chown -R $USER:$GROUPS /workdir
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds and Install feeds
        run: |
          cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a
          
          echo "移除相关组件对trojan-plus的依赖"
          # Ensure these paths are correct relative to the current directory (openwrt)
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              feeds/passwall/luci-app-passwall/Makefile || true
          
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              package/feeds/passwall/luci-app-passwall/Makefile || true # Covers case where feeds are symlinked
              
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              feeds/small8/luci-app-passwall/Makefile || true
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              package/feeds/small8/luci-app-passwall/Makefile || true # Covers case where feeds are symlinked
          echo "彻底移除 trojan-plus 包"
          rm -rf feeds/small8/trojan-plus
          rm -rf package/feeds/small8/trojan-plus # 确保两个位置都删除

          echo "删除luci-app-bypass"
          rm -rf feeds/small8/luci-app-bypass  && rm -rf package/feeds/small8/luci-app-bypass 

  
      # - name: Cache OpenWRT dl directory
      #   uses: actions/cache@main
      #   id: cache-dl
      #   with:
      #     path: openwrt/dl
      #     key: ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/feeds.conf.default', env.CONFIG_FILE, env.DIY_P1_SH) }}
      #     restore-keys: |
      #       ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-    


      # - name: Setup tmate session manually
      #   uses: mxschmitt/action-tmate@v3
      #   if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
      #   with:
      #     limit-access-to-actor: false
      #     timeout-minutes: 300          
          
      # - name: Setup tmate session if failed
      #   uses: mxschmitt/action-tmate@v3
      #   if: ${{ failure() }}
      #   with:
      #     limit-access-to-actor: false
      #     timeout-minutes: 300       
          
      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH
          echo "Before defconfig, setting CONFIG_TARGET_ROOTFS_PARTSIZE:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || echo "CONFIG_TARGET_ROOTFS_PARTSIZE=110" >> .config
          echo "===================================================================================================================================="
          echo "===================================================================================================================================="
          sed -i 's/--set=llvm.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/g' feeds/packages/lang/rust/Makefile || true
          sed -i 's/--set=llvm.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/g' feeds/packages/lang/rust/Makefile || true
          make defconfig
          sed -i 's/--set=llvm.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/g' feeds/packages/lang/rust/Makefile || true
          echo "===================================================================================================================================="
          echo "===================================================================================================================================="
          echo "After defconfig, checking CONFIG_TARGET_ROOTFS_PARTSIZE:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || (echo "Lost after defconfig, reapplying..." && echo "CONFIG_TARGET_ROOTFS_PARTSIZE=110" >> .config)
          echo "Final check after reapplication:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config

      - name: Apply WiFi configuration
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          chmod +x $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh
          $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh openwrt/files/etc/config/wireless


      # - name: Cache OpenWRT build directories (staging_dir, build_dir)
      #   uses: actions/cache@main
      #   id: cache-build
      #   with:
      #     path: |
      #       openwrt/staging_dir
      #       openwrt/build_dir
      #       openwrt/tmp # Caching tmp can sometimes help, but can also lead to issues. Monitor.
      #     key: ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/.config', env.DIY_P1_SH, env.DIY_P2_SH) }}
      #     restore-keys: |
      #       ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-


      
      - name: Checking files After custom_scripts/diy-part2.sh
        run: |
          cd openwrt
          echo "After custom_scripts/diy-part2.sh, checking .config:"
          #grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || (echo "Not found, exit" && exit 1)
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || echo "Not found, exit But continuing..."
          echo "ls -la查看目录"
          ls -la
          
          
      - name: Download package
        id: download_package
        run: |
          cd openwrt
          make download -j4
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          

      - name: Check space usage after download
        if: (!cancelled())
        run: df -hT
        
      - name: Clean up before compile
        run: |
          cd openwrt
          rm -rf .git
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          df -hT

      - name: Compile 1 (tools)
        id: compile_1
        run: |
          cd openwrt
          make tools/install -j2 V=s || make tools/install -j1 V=s

      - name: Compile 2 (toolchain)
        id: compile_2
        run: |
          cd openwrt
          make toolchain/install -j2 V=s || make toolchain/install -j1 V=s

      - name: Compile 3 (kernel)
        id: compile_3
        run: |
          cd openwrt
          make target/linux/compile -j2 V=s || make target/linux/compile -j1 V=s

      - name: Compile 4 (packages)
        id: compile_4
        run: |
          cd openwrt
          make package/compile V=s -j2 || make package/compile V=s -j1 || make V=s -j2 || make V=s -j1 || true

      - name: Compile 5 (firmware)
        id: compile_5
        run: |
          cd openwrt
          make V=s -j2 || make V=s -j1 || true
          
      - name: Clean up build artifacts
        run: |
          cd openwrt
          rm -rf build_dir/target-*/root-*
          rm -rf build_dir/toolchain-*
          rm -rf build_dir/host
          rm -rf build_dir/hostpkg-*
          rm -rf staging_dir/toolchain-*
          rm -rf staging_dir/host
          rm -rf staging_dir/hostpkg
          rm -rf dl
          rm -rf tmp
          rm -rf .ccache
          rm -f *.log
          find build_dir/target-* -name "*.o" -delete 2>/dev/null || true
          find build_dir/target-* -name "*.a" -delete 2>/dev/null || true
          df -hT
      
      
     
      - name: 归档
        run: |
          echo "压缩前先看一下目录结构"
          ls -la openwrt
          cd /workdir
          # 不使用 -h 参数，直接归档实际目录，避免递归软链接炸弹
          tar -cf - openwrt | pigz > ${{ env.SOURCE }}.tar.gz
          
          # 检查归档是否成功
          if [ ! -f "${{ env.SOURCE }}.tar.gz" ]; then
            echo "::error::归档失败，未创建 ${{ env.SOURCE }}.tar.gz"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "${{ env.SOURCE }}.tar.gz" 2>/dev/null || stat -f%z "${{ env.SOURCE }}.tar.gz" 2>/dev/null)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "::error::归档文件太小 (${FILE_SIZE} bytes)，可能损坏"
            exit 1
          fi
          
          ls -lh ${{ env.SOURCE }}.tar.gz
          
      - name: Upload to MEGA
        working-directory: /workdir
        env:
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          # 检查文件是否存在
          if [ ! -f "${{ env.SOURCE }}.tar.gz" ]; then
            echo "::error::归档文件 ${{ env.SOURCE }}.tar.gz 不存在"
            exit 1
          fi
          
          echo "准备上传文件:"
          ls -lh ${{ env.SOURCE }}.tar.gz
          
          # 上传到 MEGA
          python $GITHUB_WORKSPACE/custom_scripts/mega_manager.py upload
          
          # 标记MEGA上传成功
          echo "MEGA_UPLOAD_SUCCESS=true" >> $GITHUB_ENV
          echo "MEGA 上传成功"

      - name: Record build job outputs
        id: build_job_outputs
        if: success()
        run: echo "mega_upload=true" >> $GITHUB_OUTPUT

      - name: Validate build output
        if: success()
        env:
          MEGA_UPLOAD_SUCCESS: true
          SOURCE: OpenWrt.org_official
        run: python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py

      - name: Extract Error Log
        if: failure()
        run: |
          cd $GITHUB_WORKSPACE
          python custom_scripts/extract_last_error.py --log-dir openwrt --output last_error.log || true

      - name: Upload Error Log Artifact
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: error-log
          path: last_error.log
          retention-days: 1
      - name: Delete workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
