name: Build OpenWRT.org 1 before transplant for XIAOMI_R4

on:
  repository_dispatch:
    types: Openwrt.org Source Code Update
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: true
        default: false
  push:
    branches: 
      - master
      - main
    paths:
      - .github/workflows/Build_OpenWRT.org_1_for_XIAOMI_R4.yml
      - config_for_OpenWrt_org
      - diy-part1.sh
      - diy-part2.sh
      - package/luci-app-autoupdate/**

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config_for_OpenWrt_org
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  SOURCE: OpenWrt.org_official

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
            root-reserve-mb: 2048
            temp-reserve-mb: 512
            swap-size-mb: 1024
            build-mount-path: /workdir
            remove-dotnet: 'true'
            remove-android: 'true'
            remove-haskell: 'true'
            remove-codeql: 'true'
            remove-docker-images: 'true'
            
      - name: Checkout
        uses: actions/checkout@main
        with:
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
       
      - name: Cache APT packages
        uses: actions/cache@main
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/Build_OpenWRT.org_1_for_XIAOMI_R4.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-
          save-always: false
            
      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -y purge azure-cli* docker* ghc* llvm* 
          sudo sed -i 's/^# deb/deb/g' /etc/apt/sources.list || true
          sudo -E apt-get -qq update
          sudo apt install software-properties-common -y || true
          sudo add-apt-repository universe || true
          sudo add-apt-repository multiverse || true
          sudo apt update
          sudo apt install -y perl build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-distutils rsync bc wget ccache flex bison libelf-dev || sudo apt install -y flex bison libelf-dev build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-venv python3-pip rsync bc wget ccache perl || sudo apt policy build-essential git gettext subversion ccache python3-distutils
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R $USER:$GROUPS /workdir
          sudo apt install -y jq parallel python3-pip pigz
          # 把 pip/Go 缓存重定向到 /workdir，避免写满根分区
          mkdir -p /workdir/pip-cache /workdir/go-cache /workdir/go-mod-cache
          pip install --cache-dir /workdir/pip-cache mega.py || pip3 install --cache-dir /workdir/pip-cache mega.py || exit 1
          echo "GOPATH=/workdir/go-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=/workdir/go-mod-cache" >> $GITHUB_ENV
          echo "GOCACHE=/workdir/go-cache" >> $GITHUB_ENV
 

      - name: Cache ccache
        uses: actions/cache@main
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-${{ hashFiles(env.CONFIG_FILE, env.DIY_P1_SH, env.DIY_P2_SH) }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-
          save-always: false
         
      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT
          sudo chown -R $USER:$GROUPS /workdir
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds and Install feeds
        run: |
          cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "移除相关组件对trojan-plus的依赖"
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              feeds/passwall/luci-app-passwall/Makefile || true
          
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              package/feeds/passwall/luci-app-passwall/Makefile || true
              
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              feeds/small8/luci-app-passwall/Makefile || true
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              package/feeds/small8/luci-app-passwall/Makefile || true
          echo "彻底移除 trojan-plus 包"
          rm -rf feeds/small8/trojan-plus
          rm -rf package/feeds/small8/trojan-plus # 确保两个位置都删除

          echo "修复 sing-box 编译问题：去掉 with_tailscale tag（MIPS 不支持，且引入大量不兼容依赖）"
          for MAKEFILE in \
              feeds/packages/net/sing-box/Makefile \
              package/feeds/packages/net/sing-box/Makefile; do
            if [ -f "$MAKEFILE" ]; then
              sed -i 's/with_tailscale,//g; s/,with_tailscale//g; s/ with_tailscale//g; s/with_tailscale //g' "$MAKEFILE"
              echo "已处理: $MAKEFILE"
              grep -n "tailscale\|GO_BUILD_TAGS\|with_" "$MAKEFILE" || true
            fi
          done

 
      - name: Cache OpenWRT dl directory
        uses: actions/cache@main
        id: cache-dl
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/feeds.conf.default', env.CONFIG_FILE, env.DIY_P1_SH) }}
          restore-keys: |
            ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-
          save-always: false          
          
      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH
          echo "Before defconfig, setting CONFIG_TARGET_ROOTFS_PARTSIZE:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || echo "CONFIG_TARGET_ROOTFS_PARTSIZE=110" >> .config
          make defconfig
          echo "After defconfig, checking CONFIG_TARGET_ROOTFS_PARTSIZE:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || (echo "Lost after defconfig, reapplying..." && echo "CONFIG_TARGET_ROOTFS_PARTSIZE=110" >> .config)
          echo "Final check after reapplication:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config

      - name: Apply WiFi configuration
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          chmod +x $GITHUB_WORKSPACE/replace_wifi_config.sh
          $GITHUB_WORKSPACE/replace_wifi_config.sh openwrt/files/etc/config/wireless

      - name: Cache OpenWRT build directories (staging_dir, build_dir)
        uses: actions/cache@main
        id: cache-build
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir
          key: ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/.config', env.DIY_P1_SH, env.DIY_P2_SH) }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-
          save-always: false
          
      - name: Checking files After diy-part2.sh
        run: |
          cd openwrt
          echo "After diy-part2.sh, checking .config:"
          #grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || (echo "Not found, exit" && exit 1)
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || echo "Not found, exit But continuing..."
          echo "ls -la查看目录"
          ls -la
          
      - name: Download package
        id: download_package
        run: |
          cd openwrt
          make download -j4
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Check space usage after download
        if: (!cancelled())
        run: df -hT
        

      - name: Compile tools and toolchain
        id: compile_tools
        run: |
          cd openwrt
          make tools/install -j$(nproc) V=s > tools.log 2>&1 || make tools/install -j1 V=s > tools.log 2>&1
          make toolchain/install -j$(nproc) V=s > toolchain.log 2>&1 || make toolchain/install -j1 V=s > toolchain.log 2>&1

      - name: Compile kernel
        id: compile_kernel
        run: |
          cd openwrt
          make target/linux/compile -j$(nproc) V=s > kernel.log 2>&1 || make target/linux/compile -j1 V=s > kernel.log 2>&1
          
     
     
      - name: 归档前清理
        run: |
          cd openwrt
          echo "清理前磁盘空间："
          df -hT
          # 删除编译日志
          rm -f *.log
          # 删除 dl 目录（源码包，第2步不需要）
          rm -rf dl
          # 删除 host 工具链（第2步会重新用 target 工具链）
          rm -rf staging_dir/host
          rm -rf staging_dir/hostpkg
          rm -rf build_dir/host
          rm -rf build_dir/hostpkg-*
          # 删除 target 编译中间文件（.o .a），保留 .so 和二进制
          find build_dir/target-* -name "*.o" -delete 2>/dev/null || true
          find build_dir/target-* -name "*.a" -delete 2>/dev/null || true
          # 删除 tmp 目录
          rm -rf tmp
          # 删除 .git
          rm -rf .git
          echo "清理后磁盘空间："
          df -hT

      - name: 归档
        run: |
          echo "压缩前先看一下目录结构"
          ls -la /workdir/openwrt
          cd /workdir
          # 不使用 -h 参数，直接归档实际目录，避免递归软链接炸弹
          tar -cf - openwrt | pigz > ${{ env.SOURCE }}.tar.gz
          echo "压缩后磁盘空间："
          df -hT
          ls -lh ${{ env.SOURCE }}.tar.gz
          # 移动到 GITHUB_WORKSPACE 供后续步骤使用
          # 保持文件在 /workdir，避免占用根分区空间
          

          
      - name: Upload to MEGA
        working-directory: /workdir
        env:
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          ls -lh ${{ env.SOURCE }}.tar.gz || echo "归档文件不存在"
          python $GITHUB_WORKSPACE/upload_to_MEGA.py
          echo "MEGA_UPLOAD_SUCCESS=true" >> $GITHUB_ENV

      - name: Validate build output
        run: |
          python $GITHUB_WORKSPACE/validate_build_output.py

      - name: Auto fix with MiniMax AI on failure
        if: failure()
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_MODEL_LIST: ${{ secrets.MINIMAX_MODEL_LIST }}
          ACTIONS_TRIGGER_PAT: ${{ secrets.ACTIONS_TRIGGER_PAT }}
          WORKFLOW_FILE: .github/workflows/Build_OpenWRT.org_1_for_XIAOMI_R4.yml
        run: |
          pip install requests --quiet || true
          python auto_fix_with_AI_LLM.py

      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
