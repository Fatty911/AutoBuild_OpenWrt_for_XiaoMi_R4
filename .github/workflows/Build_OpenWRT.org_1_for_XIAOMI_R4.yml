name: Build OpenWRT.org 1 before transplant for XIAOMI_R4

on:
  repository_dispatch:
    types: Openwrt.org Source Code Update
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: true
        default: false
  push:
    branches: 
      - master
      - main
    paths:
      - 'custom_scripts/**'
      - 'custom_configs/**'
      - .github/workflows/Build_OpenWRT.org_1_for_XIAOMI_R4.yml
      - package/luci-app-autoupdate/**

concurrency:
  group: org1-phase1-${{ github.ref }}-${{ (endsWith(format('{0}', github.run_number), '0') || endsWith(format('{0}', github.run_number), '2') || endsWith(format('{0}', github.run_number), '4') || endsWith(format('{0}', github.run_number), '6') || endsWith(format('{0}', github.run_number), '8')) && 'even' || 'odd' }}
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom_configs/config_for_OpenWrt_org
  DIY_P1_SH: custom_scripts/diy-part1.sh
  DIY_P2_SH: custom_scripts/diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  SOURCE: OpenWrt.org_official

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
            root-reserve-mb: 2048
            temp-reserve-mb: 512
            swap-size-mb: 1024
            build-mount-path: /workdir
            remove-dotnet: 'true'
            remove-android: 'true'
            remove-haskell: 'true'
            remove-codeql: 'true'
            remove-docker-images: 'true'
            
      - name: Checkout
        uses: actions/checkout@main
        with:
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
       
      - name: Cache APT packages
        uses: actions/cache@main
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/Build_OpenWRT.org_1_for_XIAOMI_R4.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-
          save-always: false
            
      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -y purge azure-cli* docker* ghc* llvm* 
          sudo sed -i 's/^# deb/deb/g' /etc/apt/sources.list || true
          sudo -E apt-get -qq update
          sudo apt install software-properties-common -y || true
          sudo add-apt-repository universe || true
          sudo add-apt-repository multiverse || true
          sudo apt update
          sudo apt install -y perl build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-distutils rsync bc wget ccache flex bison libelf-dev || sudo apt install -y flex bison libelf-dev build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-venv python3-pip rsync bc wget ccache perl || sudo apt policy build-essential git gettext subversion ccache python3-distutils
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R $USER:$GROUPS /workdir
          sudo apt install -y jq parallel python3-pip pigz
          curl -fsSL https://mega.nz/keys/MEGA_signing.key | sudo gpg --dearmor -o /usr/share/keyrings/meganz-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/meganz-archive-keyring.gpg] https://mega.nz/linux/repo/xUbuntu_22.04/ ./" | sudo tee /etc/apt/sources.list.d/mega.list
          sudo apt update && sudo apt install -y megacmd
          echo "GOPATH=/workdir/go-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=/workdir/go-mod-cache" >> $GITHUB_ENV
          echo "GOCACHE=/workdir/go-cache" >> $GITHUB_ENV
 

      - name: Cache ccache
        uses: actions/cache@main
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-${{ hashFiles(env.CONFIG_FILE, env.DIY_P1_SH, env.DIY_P2_SH) }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.REPO_BRANCH }}-
          save-always: false
         
      - name: Clone source code
        working-directory: /workdir
        run: |
          df -hT
          sudo chown -R $USER:$GROUPS /workdir
          git clone $REPO_URL -b $REPO_BRANCH openwrt
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

      - name: Load custom feeds
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: Update feeds and Install feeds
        run: |
          cd openwrt && ./scripts/feeds update -a && ./scripts/feeds install -a
          echo "移除相关组件对trojan-plus的依赖"
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              feeds/passwall/luci-app-passwall/Makefile || true
          
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              package/feeds/passwall/luci-app-passwall/Makefile || true
              
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              feeds/small8/luci-app-passwall/Makefile || true
          sed -i \
              -e '/select PACKAGE_trojan-plus/d' \
              -e '/config PACKAGE_.*_INCLUDE_Trojan_Plus/,/default /s/default y/default n/' \
              package/feeds/small8/luci-app-passwall/Makefile || true
          echo "彻底移除 trojan-plus 包"
          rm -rf feeds/small8/trojan-plus
          rm -rf package/feeds/small8/trojan-plus # 确保两个位置都删除

          echo "修复 sing-box 编译问题：去掉 with_tailscale tag（MIPS 不支持，且引入大量不兼容依赖）"
          for MAKEFILE in \
              feeds/packages/net/sing-box/Makefile \
              package/feeds/packages/net/sing-box/Makefile; do
            if [ -f "$MAKEFILE" ]; then
              sed -i 's/with_tailscale,//g; s/,with_tailscale//g; s/ with_tailscale//g; s/with_tailscale //g' "$MAKEFILE"
              echo "已处理: $MAKEFILE"
              grep -n "tailscale\|GO_BUILD_TAGS\|with_" "$MAKEFILE" || true
            fi
          done

 
      - name: Cache OpenWRT dl directory
        uses: actions/cache@main
        id: cache-dl
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/feeds.conf.default', env.CONFIG_FILE, env.DIY_P1_SH) }}
          restore-keys: |
            ${{ runner.os }}-dl-${{ env.REPO_BRANCH }}-
          save-always: false          
          
      - name: Load custom configuration
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
          chmod +x $DIY_P2_SH
          cd openwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH
          echo "Before defconfig, setting CONFIG_TARGET_ROOTFS_PARTSIZE:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || echo "CONFIG_TARGET_ROOTFS_PARTSIZE=110" >> .config
          make defconfig
          echo "After defconfig, checking CONFIG_TARGET_ROOTFS_PARTSIZE:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || (echo "Lost after defconfig, reapplying..." && echo "CONFIG_TARGET_ROOTFS_PARTSIZE=110" >> .config)
          echo "Final check after reapplication:"
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config

      - name: Apply WiFi configuration
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
        run: |
          chmod +x $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh
          $GITHUB_WORKSPACE/custom_scripts/replace_wifi_config.sh openwrt/files/etc/config/wireless

      - name: Cache OpenWRT build directories (staging_dir, build_dir)
        uses: actions/cache@main
        id: cache-build
        with:
          path: |
            openwrt/staging_dir
            openwrt/build_dir
          key: ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-${{ hashFiles('openwrt/.config', env.DIY_P1_SH, env.DIY_P2_SH) }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.REPO_BRANCH }}-
          save-always: false
          
      - name: Checking files After custom_scripts/diy-part2.sh
        run: |
          cd openwrt
          echo "After custom_scripts/diy-part2.sh, checking .config:"
          #grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || (echo "Not found, exit" && exit 1)
          grep "CONFIG_TARGET_ROOTFS_PARTSIZE" .config || echo "Not found, exit But continuing..."
          echo "ls -la查看目录"
          ls -la
          
      - name: Download package
        id: download_package
        run: |
          cd openwrt
          make download -j4
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: Check space usage after download
        if: (!cancelled())
        run: df -hT

      - name: Compile tools and toolchain
        id: compile_tools
        run: |
          cd openwrt
          make tools/install -j$(nproc) V=s > tools.log 2>&1 || make tools/install -j1 V=s > tools.log 2>&1
          make toolchain/install -j$(nproc) V=s > toolchain.log 2>&1 || make toolchain/install -j1 V=s > toolchain.log 2>&1

      - name: Compile kernel
        id: compile_kernel
        run: |
          cd openwrt
          make target/linux/compile -j$(nproc) V=s > kernel.log 2>&1 || make target/linux/compile -j1 V=s > kernel.log 2>&1
          
      - name: Base-files fix
        run: |
          cd openwrt
          echo "=== 修复 base-files 版本 (APK 兼容性) ==="
          sed -i 's/PKG_RELEASE:=$(COMMITCOUNT)/PKG_RELEASE:=1-r1/' package/base-files/Makefile || true
          sed -i 's/^[[:space:]]*VERSION:=.*/  VERSION:=1-r1/' package/base-files/Makefile || true

          # 3) 清理旧缓存
          find staging_dir -name 'base-files.version' -delete 2>/dev/null || true
          rm -rf build_dir/target-*/base-files/ tmp/.base-files_* 2>/dev/null || true
          echo "base-files APK 版本格式修复完成"

      - name: Ensure python-installer is built first
        run: |
          cd openwrt
          echo "=== 确保 python-installer 在 python-packaging 之前编译 ==="
          # python-packaging host-compile 需要 python-installer 模块
          # 显式先编译 python-installer
          if [ -d "feeds/packages/lang/python/python-installer" ]; then
            echo "编译 python-installer host package..."
            make package/feeds/packages/python-installer/host-compile V=s || \
              make package/feeds/packages/python-installer/compile V=s || \
              echo "python-installer 编译失败，但继续尝试后续编译"
          else
            echo "feeds/packages/lang/python/python-installer 目录不存在，跳过"
          fi
          echo "python-installer 优先编译步骤完成"

      - name: Compile packages only
        run: |
          cd openwrt
          echo "=== 开始编译 packages 部分 ==="
          make package/compile -j$(nproc) V=s > packages.log 2>&1 || {
            echo "首次编译 packages 失败，尝试运行修复脚本..."
            python $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py --max-retry 1 "make package/compile V=s" "packages.log"
          }
          echo "=== packages 编译步骤结束 ==="
          
      - name: Install packages
        run: |
          cd openwrt
          echo "=== 开始安装 packages ==="
          make package/install -j$(nproc) V=s > package_install.log 2>&1 || make package/install -j1 V=s >> package_install.log 2>&1 || true
          echo "=== packages 安装步骤结束 ==="

      - name: Perform manual porting for Xiaomi Mi Router 4
        id: transplant
        run: |
          cd openwrt
          echo "=== 执行移植：为 Xiaomi Mi Router 4 添加 LEDE 的 base-files ==="
          git clone --depth 1 https://github.com/coolsnowwolf/lede lede-source
          if [ -d "lede-source/target/linux/ramips/mt7621/base-files" ]; then
            mkdir -p target/linux/ramips/mt7621/
            cp -r lede-source/target/linux/ramips/mt7621/base-files target/linux/ramips/mt7621/ 
            echo "移植完成：已复制 LEDE 的 base-files"
          else
            echo "警告: LEDE 中未找到 base-files，跳过移植"
          fi
          rm -rf lede-source
          echo "移植步骤完成"
          
      - name: 归档前清理
        run: |
          cd openwrt
          echo "清理前磁盘空间："
          df -hT
          
          echo "=== 优化归档：保留可复用产物 ==="
          
          # 删除编译日志
          rm -f *.log
          
          # 【保留】dl 目录 - Org2 可以复用源码包，避免重新下载
          # rm -rf dl  # 不再删除，节省下游 5-10 分钟
          
          # 【保留】staging_dir/host - Org2 需要用于生成固件
          # rm -rf staging_dir/host  # 不删除
          # rm -rf staging_dir/hostpkg  # 不删除
          
          # 【删除】build_dir/host - 编译中间文件，可从 staging_dir/host 重新生成
          rm -rf build_dir/host
          rm -rf build_dir/hostpkg-*
          
          # 【删除】toolchain 编译中间文件 - staging_dir/toolchain 已足够
          rm -rf build_dir/toolchain-*
          
          # 【保留】target 编译产物 - .o .a 文件用于增量编译
          # find build_dir/target-* -name "*.o" -delete 2>/dev/null || true
          # find build_dir/target-* -name "*.a" -delete 2>/dev/null || true
          
          # 【删除】临时文件
          rm -rf tmp
          rm -rf .git
          
          echo "归档内容预览："
          du -sh dl staging_dir build_dir 2>/dev/null || true
          echo "清理后磁盘空间："
          df -hT

      - name: 归档
        run: |
          echo "压缩前先看一下目录结构"
          ls -la /workdir/openwrt
          cd /workdir
          # 不使用 -h 参数，直接归档实际目录，避免递归软链接炸弹
          tar -cf - openwrt | pigz > ${{ env.SOURCE }}.tar.gz
          
          # 检查归档是否成功
          if [ ! -f "${{ env.SOURCE }}.tar.gz" ]; then
            echo "::error::归档失败，未创建 ${{ env.SOURCE }}.tar.gz"
            exit 1
          fi
          
          FILE_SIZE=$(stat -c%s "${{ env.SOURCE }}.tar.gz" 2>/dev/null || stat -f%z "${{ env.SOURCE }}.tar.gz" 2>/dev/null)
          if [ "$FILE_SIZE" -lt 1000000 ]; then
            echo "::error::归档文件太小 (${FILE_SIZE} bytes)，可能损坏"
            exit 1
          fi
          
          echo "压缩后磁盘空间："
          df -hT
          ls -lh ${{ env.SOURCE }}.tar.gz

      - name: Upload to MEGA
        working-directory: /workdir
        env:
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          # 检查文件是否存在
          if [ ! -f "${{ env.SOURCE }}.tar.gz" ]; then
            echo "::error::归档文件 ${{ env.SOURCE }}.tar.gz 不存在"
            exit 1
          fi
          
          echo "准备上传文件:"
          ls -lh ${{ env.SOURCE }}.tar.gz
          
          # 上传到 MEGA
          python $GITHUB_WORKSPACE/custom_scripts/mega_manager.py upload
          
          # 标记MEGA上传成功
          echo "MEGA_UPLOAD_SUCCESS=true" >> $GITHUB_ENV
          echo "MEGA 上传成功"

      - name: Record build job outputs
        id: build_job_outputs
        if: success()
        run: echo "mega_upload=true" >> $GITHUB_OUTPUT

      - name: Validate build output
        if: success()
        env:
          MEGA_UPLOAD_SUCCESS: ${{ env.MEGA_UPLOAD_SUCCESS }}
          SOURCE: OpenWrt.org_official
        run: python $GITHUB_WORKSPACE/custom_scripts/validate_build_output.py

      - name: Extract Error Log
        if: failure()
        run: |
          cd $GITHUB_WORKSPACE
          python custom_scripts/extract_last_error.py --log-dir openwrt --output last_error.log || true

      - name: Upload Error Log Artifact
        uses: actions/upload-artifact@main
        if: failure()
        with:
          name: error-log
          path: last_error.log
          retention-days: 1
      - name: Delete workflow runs
        if: always()
        uses: Mattraks/delete-workflow-runs@main
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 2
