name: AI Auto Fix Monitor
run-name: "AI Fix for ${{ github.event.workflow_run.name || inputs.failed_workflow_name }} (#${{ github.event.workflow_run.run_number || inputs.failed_run_id }})"

on:
  workflow_run:
    workflows:
      - "Build OpenWrt Firmware for Xiaomi Mi Router 4"
    types:
      - completed
  workflow_dispatch:
    inputs:
      failed_run_id:
        description: 'Failed Run ID'
        required: true
        type: string
      failed_workflow_name:
        description: 'Failed Workflow Name'
        required: true
        type: string

jobs:
  ai_fix:
    name: "AI Fix → ${{ github.event.workflow_run.name || inputs.failed_workflow_name }}"
    if: ${{ (github.event_name == 'workflow_dispatch') || (github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.name != 'AI Auto Fix Monitor') }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}

      - name: Download error log artifact
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
          RUN_ID: ${{ github.event.workflow_run.id || inputs.failed_run_id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || inputs.failed_workflow_name }}
        run: |
          echo "检测到工作流 [$WORKFLOW_NAME] 运行失败！"
          echo "正在下载错误日志 (Run ID: $RUN_ID)..."
          # 方法1: 尝试使用 gh run download
          if gh run download $RUN_ID -n error-log 2>/dev/null; then
            echo "成功下载 error-log artifact"
          else
            echo "未找到 error-log 产物，尝试通过 gh CLI 提取失败日志..."
            # 方法2: 使用 gh run view --log-failed
            if gh run view $RUN_ID --log-failed 2>/dev/null | tail -n 500 > last_error.log; then
              if [ -s last_error.log ]; then
                echo "已从 gh run view 提取日志到 last_error.log"
              fi
            fi
            # 方法3: 尝试下载整个 run 的日志
            if [ ! -s last_error.log ]; then
              echo "gh run view 也未获取到日志，尝试下载完整日志..."
              gh run download $RUN_ID --dir /tmp/failed_run_logs 2>/dev/null || true
              if [ -d /tmp/failed_run_logs ]; then
                find /tmp/failed_run_logs -name "*.txt" -exec cat {} \; 2>/dev/null | grep -iE "error|failed|fatal|make: \*\*\*" | tail -n 200 > last_error.log || true
              fi
            fi
            # 方法4: 直接从 API 获取日志
            if [ ! -s last_error.log ]; then
              echo "尝试从 API 直接获取日志..."
              gh api repos/${{ github.repository }}/actions/runs/$RUN_ID/jobs --jq '.jobs[0].id' 2>/dev/null | while read job_id; do
                gh api repos/${{ github.repository }}/actions/jobs/$job_id/logs 2>/dev/null | strings | grep -iE "error|failed|fatal|make: \*\*\*" | tail -n 200 >> last_error.log || true
              done
            fi
            # 方法5: 如果构建工作流还在运行，获取其日志
            if [ ! -s last_error.log ]; then
              echo "尝试从构建工作流本身获取日志..."
              # 等待一小段时间让日志可用
              sleep 5
              gh run view $RUN_ID --log 2>/dev/null | strings | grep -iE "error|failed|fatal|make: \*\*\*" | tail -n 200 > last_error.log || true
            fi
          fi
          # 没有真实错误日志时拒绝盲修
          if [ ! -s last_error.log ]; then
            echo "::error::未能获取失败工作流的真实错误日志，拒绝启动 AI 修复"
            exit 1
          fi
          echo "=== 最终错误日志 ==="
          head -20 last_error.log || echo "日志文件为空"
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyyaml
          
      - name: Setup OpenCode and Oh My OpenCode
        run: |
          echo "=== 启动单一 OpenCode 自动修复路径 ==="
          # 安装 Bun（omo install 需要）
          curl -fsSL https://bun.sh/install | bash
          export PATH="$HOME/.bun/bin:$PATH"
          # 安装 opencode 和 omo
          npm install -g opencode-ai oh-my-openagent
          mkdir -p $HOME/.config/opencode
          if [ -f opencode.json ]; then
            cp opencode.json $HOME/.config/opencode/
          else
            echo '{"provider":{}}' > $HOME/.config/opencode/opencode.json
          fi
          cp oh-my-openagent.json $HOME/.config/opencode/ 2>/dev/null || true
          oh-my-opencode install --no-tui --claude=no --gemini=no --copilot=no --skip-auth

      - name: Run OpenCode Agent
        id: opencode_fix
        timeout-minutes: 90
        env:
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id || inputs.failed_run_id }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || inputs.failed_workflow_name }}
          WORKFLOW_PATH: ${{ github.event.workflow_run.path || '.github/workflows/Build_OpenWrt_Firmware.yml' }}
          REPOSITORY: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_PROXY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          QIANFAN_CODING_API_KEY: ${{ secrets.QIANFAN_CODING_API_KEY }}
          VOLCANO_CODINGPLAN_API_KEY: ${{ secrets.VOLCANO_CODINGPLAN_API_KEY }}
          ALIYUN_TOKENPLAN_API_KEY: ${{ secrets.ALIYUN_TOKENPLAN_API_KEY }}
          MIMO_TOKENPLAN_API_KEY: ${{ secrets.MIMO_TOKENPLAN_API_KEY }}
          GLM_PROXY_BASE_URL: ${{ secrets.GLM_PROXY_URL }}
          GLM_PROXY_URL: ${{ secrets.GLM_PROXY_URL }}
          ACTIONS_TRIGGER_PAT: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
          GH_TOKEN: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
        run: |
          cd "$GITHUB_WORKSPACE"
          bash custom_scripts/run_track3.sh

      - name: Delete workflow runs
        if: always()
        run: |
          echo "Workflow runs are cleaned up centrally by cleanup-workflow-runs.yml"
          echo "This workflow keeps the latest 2 successful and 2 failed runs"
          echo "Daily cleanup runs at 3 AM UTC (11 AM China time)"
