name: AI Auto Fix Monitor

on:
  workflow_run:
    workflows: [
      "Build coolsnowwolf-LEDE 1 Toolchain and Kernel for XIAOMI_R4",
      "Build coolsnowwolf-LEDE 2 Packages and Firmware for XIAOMI_R4",
      "Build coolsnowwolf-LEDE Full for XIAOMI_R4",
      "Build Lienol 1 Tools and Kernel before packages for XIAOMI_R4",
      "Build Lienol 2 packages and fixes for XIAOMI_R4",
      "Build OpenWRT.org 1 before transplant for XIAOMI_R4",
      "Build OpenWRT.org 2 fix and transplant for XIAOMI_R4",
      "Simple 1 Build OpenWRT.org 1 before transplant for XIAOMI_R4",
      "Simple Build OpenWRT for Xiaomi Mi Router 4 with Custom Packages"
    ]
    types:
      - completed

jobs:
  ai_fix:
    # 只有当触发它的工作流状态是 failure，并且它不是自己（防止死循环）时才执行
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.name != 'AI Auto Fix Monitor' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download error log artifact
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
        run: |
          echo "检测到工作流 [${{ github.event.workflow_run.name }}] 运行失败！"
          echo "正在下载错误日志 (Run ID: ${{ github.event.workflow_run.id }})..."
          gh run download ${{ github.event.workflow_run.id }} -n error-log || echo "未找到 error-log 产物，可能错误过早发生或未被提取。"
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyyaml
          
      - name: Download Error Log Artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: error-log
          github-token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run AI Auto Fix (Track 2)
        id: track2
        continue-on-error: true
        env:
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          CLAUDE_PROXY_API_KEY: ${{ secrets.CLAUDE_PROXY_API_KEY }}
          CLAUDE_PROXY_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          ACTIONS_TRIGGER_PAT: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
          WORKFLOW_FILE: ${{ github.workspace }}/${{ github.event.workflow_run.path }}
        run: |
          if [ -f "last_error.log" ]; then
            echo "=== 找到 last_error.log ==="
            cat last_error.log
            python custom_scripts/auto_fix_with_AI_LLM.py
          else
            echo "没有找到 last_error.log，无法执行 AI 修复。"
            exit 1
          fi

      - name: Setup OpenCode & OhMyOpenCode (Track 3)
        if: steps.track2.outcome == 'failure'
        run: |
          echo "=== Track 2 失败，启动 OpenCode 深度修复 ==="
          npm install -g opencode-ai oh-my-opencode

      - name: Run OpenCode Agent
        if: steps.track2.outcome == 'failure'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_PROXY_API_KEY }}
          ACTIONS_TRIGGER_PAT: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
          GH_TOKEN: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
        run: |
          # 清除可能残留的 actions runner checkout auth header，防止 github.token 覆盖 PAT
          git config --local --unset-all http.https://github.com/.extraheader || true
          
          # 彻底重置 Git 状态，抹除 Track 2 留下的未推送 commit 或分支切换
          git fetch origin main
          git checkout main || git checkout -b main
          git reset --hard origin/main
          git clean -fd
          
          if [ ! -f "last_error.log" ]; then
            echo "Track 3: 未找到 last_error.log，尝试使用 gh CLI 提取原始日志..."
            gh run download ${{ github.event.workflow_run.id }} -n error-log || echo "日志下载彻底失败，将由大模型自行探索"
          fi
          
          opencode run --model "openai/gpt-4o" "分析 last_error.log 中的报错信息。运用 LSP 和 Grep 搜索源码，找到根本原因并修复代码（修改 custom_scripts、配置文件等）。请不要修改 GitHub Actions 的 yml 工作流文件本身。修复完成后请退出。"
          
          # 提交修复
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f last_error.log  # Delete the downloaded log so it isn't committed
          git add .
          git commit -m "Auto-fix build error with OpenCode Deep Repair" || { echo "No changes to commit, considering fix failed"; exit 1; }
          git remote set-url origin https://${ACTIONS_TRIGGER_PAT}@github.com/${{ github.repository }}.git
          git push origin HEAD:main || { echo "Push failed"; exit 1; }

