name: AI Auto Fix Monitor

on:
  workflow_run:
    workflows: [
      "Build coolsnowwolf-LEDE 1 Toolchain and Kernel for XIAOMI_R4",
      "Build coolsnowwolf-LEDE 2 Packages and Firmware for XIAOMI_R4",
      "Build coolsnowwolf-LEDE Full for XIAOMI_R4",
      "Build Lienol 1 Tools and Kernel before packages for XIAOMI_R4",
      "Build Lienol 2 packages and fixes for XIAOMI_R4",
      "Build OpenWRT.org 1 before transplant for XIAOMI_R4",
      "Build OpenWRT.org 2 fix and transplant for XIAOMI_R4",
      "Simple 1 Build OpenWRT.org 1 before transplant for XIAOMI_R4",
      "Simple Build OpenWRT for Xiaomi Mi Router 4 with Custom Packages"
    ]
    types:
      - completed

jobs:
  ai_fix:
    name: "AI Fix → ${{ github.event.workflow_run.name }}"
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.name != 'AI Auto Fix Monitor' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      actions: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@main

      - name: Download error log artifact
        env:
          GITHUB_TOKEN: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
        run: |
          echo "检测到工作流 [${{ github.event.workflow_run.name }}] 运行失败！"
          echo "正在下载错误日志 (Run ID: ${{ github.event.workflow_run.id }})..."
          gh run download ${{ github.event.workflow_run.id }} -n error-log || echo "未找到 error-log 产物，可能错误过早发生或未被提取。"
          ls -la

      - name: Setup Node.js
        uses: actions/setup-node@main
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@main
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pyyaml
          
      - name: Download Error Log Artifact
        continue-on-error: true
        uses: actions/download-artifact@main
        with:
          name: error-log
          github-token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run AI Auto Fix (Track 2)
        id: track2
        continue-on-error: true
        env:
          FAILED_RUN_ID: ${{ github.event.workflow_run.id }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          CLAUDE_PROXY_API_KEY: ${{ secrets.CLAUDE_PROXY_API_KEY }}
          CLAUDE_PROXY_URL: ${{ secrets.CLAUDE_PROXY_URL }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_PROXY_URL: ${{ secrets.XAI_PROXY_URL }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MINIMAX_MODEL_LIST: ${{ secrets.MINIMAX_MODEL_LIST }}
          MODAL_API_KEY: ${{ secrets.MODAL_API_KEY }}
          MODAL_MODEL_LIST: ${{ secrets.MODAL_MODEL_LIST }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          MODELSCOPE_MODEL_LIST: ${{ secrets.MODELSCOPE_MODEL_LIST }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ATOMGIT_MODEL_LIST: ${{ secrets.ATOMGIT_MODEL_LIST }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ZHIPU_MODEL_LIST: ${{ secrets.ZHIPU_MODEL_LIST }}
          OPENROUTER_MODEL_LIST: ${{ secrets.OPENROUTER_MODEL_LIST }}
          SILICONFLOW_MODEL_LIST: ${{ secrets.SILICONFLOW_MODEL_LIST }}
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          NVIDIA_NIM_MODEL_LIST: ${{ secrets.NVIDIA_NIM_MODEL_LIST }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          QINIU_MODEL_LIST: ${{ secrets.QINIU_MODEL_LIST }}
          GLM_PROXY_URL: ${{ secrets.GLM_PROXY_URL }}
          ACTIONS_TRIGGER_PAT: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
          WORKFLOW_FILE: ${{ github.workspace }}/${{ github.event.workflow_run.path }}
        run: |
          if [ -f "last_error.log" ]; then
            echo "=== 找到 last_error.log ==="
            cat last_error.log
            python custom_scripts/auto_fix_with_AI_LLM.py
          else
            echo "没有找到 last_error.log，无法执行 AI 修复。"
            exit 1
          fi

      - name: Setup OpenCode & OhMyOpenCode (Track 3)
        if: steps.track2.outcome == 'failure'
        run: |
          echo "=== Track 2 失败，启动 OpenCode 深度修复 ==="
          npm install -g opencode-ai oh-my-openagent

      - name: Run OpenCode Agent
        id: track3
        if: steps.track2.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_PROXY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          BAILIAN_API_KEY: ${{ secrets.BAILIAN_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          MODELSCOPE_API_KEY: ${{ secrets.MODELSCOPE_API_KEY }}
          ATOMGIT_API_KEY: ${{ secrets.ATOMGIT_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
          GLM_PROXY_URL: ${{ secrets.GLM_PROXY_URL }}
          CLAUDE_MODEL_LIST: ${{ secrets.CLAUDE_PROXY_MODEL_LIST }}
          OPENROUTER_MODEL_LIST: ${{ secrets.OPENROUTER_MODEL_LIST }}
          OPENAI_MODEL_LIST: ${{ secrets.OPENAI_MODEL_LIST }}
          XAI_MODEL_LIST: ${{ secrets.XAI_MODEL_LIST }}
          DEEPSEEK_MODEL_LIST: ${{ secrets.DEEPSEEK_MODEL_LIST }}
          BAILIAN_MODEL_LIST: ${{ secrets.BAILIAN_MODEL_LIST }}
          MOONSHOT_MODEL_LIST: ${{ secrets.MOONSHOT_MODEL_LIST }}
          SILICONFLOW_MODEL_LIST: ${{ secrets.SILICONFLOW_MODEL_LIST }}
          MODELSCOPE_MODEL_LIST: ${{ secrets.MODELSCOPE_MODEL_LIST }}
          ATOMGIT_MODEL_LIST: ${{ secrets.ATOMGIT_MODEL_LIST }}
          ZHIPU_MODEL_LIST: ${{ secrets.ZHIPU_MODEL_LIST }}
          NVIDIA_NIM_MODEL_LIST: ${{ secrets.NVIDIA_NIM_MODEL_LIST }}
          QINIU_MODEL_LIST: ${{ secrets.QINIU_MODEL_LIST }}
          GLM_MODEL_LIST: ${{ secrets.GLM_MODEL_LIST }}
          ACTIONS_TRIGGER_PAT: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
          GH_TOKEN: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}
        run: |
          set -euo pipefail
          git config --local --unset-all http.https://github.com/.extraheader || true
          
          git fetch origin main
          git checkout main || git checkout -b main
          git reset --hard origin/main
          git clean -fd
          
          if [ ! -f "last_error.log" ]; then
            echo "Track 3: 未找到 last_error.log，尝试使用 gh CLI 提取原始日志..."
            gh run download ${{ github.event.workflow_run.id }} -n error-log || echo "日志下载彻底失败，将由大模型自行探索"
          fi

          BEST_MODEL=$(python custom_scripts/pick_best_model.py)
          SMALL_MODEL=$(python custom_scripts/pick_best_model.py --small)
          echo "Track 3 选定模型: $BEST_MODEL (轻量: $SMALL_MODEL)"
          
          if [ "$BEST_MODEL" = "NO_MODEL_AVAILABLE" ]; then
            echo "::error::无可用模型，Track 3 终止"
            exit 1
          fi
          
          # ── 提取 transplant 步骤上下文（用于 DTS/phandle 报错）──
          TRANSPLANT_CONTEXT=""
          WORKFLOW_YML="${{ github.workspace }}/${{ github.event.workflow_run.path }}"
          if [ -f "$WORKFLOW_YML" ]; then
            TRANSPLANT_CONTEXT=$(grep -A 20 "transplant" "$WORKFLOW_YML" 2>/dev/null | head -30 || echo "未找到 transplant 步骤")
          fi
          
          # ── 生成 opencode.json（使用 pick_best_model 返回的 provider/model 格式）──
          python custom_scripts/pick_best_model.py --opencode-config > opencode.json
          echo "生成的 opencode.json:"
          cat opencode.json
          
          cp $GITHUB_WORKSPACE/AGENTS.md . 2>/dev/null || true
          
          # ── 根据报错类型定制 prompt（使用临时文件避免 YAML 多行解析问题）──
          FIX_SUCCEEDED=false
          if grep -qi "phandle\|dts\|dtsi\|factory\|transplant" last_error.log 2>/dev/null; then
            echo "分析 last_error.log 中的 DTS/phandle 报错信息。这类报错通常是因为工作流的 transplant 步骤复制了 DTS 文件但没有复制配套的 dtsi 文件。请检查 transplant 步骤是否需要同时复制 mt7621_xiaomi_nand_128m.dtsi 等配套文件。修复方式：修改工作流的 transplant 步骤（添加 cp dtsi 的命令）。请遵守 AGENTS.md 的规则：不要删除关键步骤（Generate release tag、Upload firmware to release 等）。修复完成后请退出。当前工作流的 transplant 步骤内容：$TRANSPLANT_CONTEXT" > prompt.txt
            if oh-my-opencode run --model "$BEST_MODEL" "$(cat prompt.txt)"; then
              FIX_SUCCEEDED=true
            elif opencode run --agent general --model "$BEST_MODEL" "分析 last_error.log 的 DTS/phandle 报错。检查工作流 transplant 步骤是否缺少复制 dtsi 文件。修改工作流添加必要的 cp 命令。不要删除关键步骤。退出。"; then
              FIX_SUCCEEDED=true
            else
              echo "::error::oh-my-opencode 和 opencode 均失败，DTS/phandle 修复未成功"
            fi
            rm -f prompt.txt
          else
            if oh-my-opencode run --model "$BEST_MODEL" "分析 last_error.log 中的报错信息。运用 LSP 和 Grep 搜索源码，找到根本原因并修复代码（修改 custom_scripts、配置文件、工作流 transplant 步骤等）。请不要删除关键步骤：Generate release tag、Upload firmware to release、Delete workflow runs。修复完成后请退出。"; then
              FIX_SUCCEEDED=true
            elif opencode run --agent general --model "$BEST_MODEL" "分析 last_error.log 报错。搜索源码找到根本原因并修复。不要删除关键步骤。退出。"; then
              FIX_SUCCEEDED=true
            else
              echo "::error::oh-my-opencode 和 opencode 均失败，修复未成功"
            fi
          fi
          
          # ── 仅在 AI 修复成功后才提交和推送 ──
          if [ "$FIX_SUCCEEDED" != "true" ]; then
            echo "::error::Track 3 AI 修复失败，不提交任何更改"
            exit 1
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -f last_error.log prompt.txt 2>/dev/null || true
          git add .
          if git diff --cached --quiet; then
            echo "::error::AI 运行完成但未产生任何代码更改，修复可能无效"
            exit 1
          fi
          git commit -m "Auto-fix build error with OpenCode Deep Repair"
          git remote set-url origin https://${ACTIONS_TRIGGER_PAT}@github.com/${{ github.repository }}.git
          git push origin HEAD:main || { echo "::error::Push failed"; exit 1; }
          echo "Track 3 修复成功并已推送"
          
          # ── 重触发原来失败的工作流 ──
          FAILED_WORKFLOW="${{ github.event.workflow_run.name }}"
          FAILED_RUN_ID="${{ github.event.workflow_run.id }}"
          echo "重触发工作流: $FAILED_WORKFLOW (Run ID: $FAILED_RUN_ID)"
          gh run rerun $FAILED_RUN_ID || echo "重触发失败，可手动触发"

