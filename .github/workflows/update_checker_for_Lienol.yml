name: Update Checker for Lienol

env:
  REPO_URL: https://github.com/Lienol/openwrt

on:
  workflow_dispatch:
  schedule:
   - cron: 0 */18 * * *

jobs:
  check:
    runs-on: ubuntu-latest

    steps:

    - name: Get Commit Hash
      id: getHash
      run: |
        # 获取 OpenWrt 官方最新稳定版本号
        echo "获取 OpenWrt 官方最新稳定版本..."
        STABLE_VERSION=$(curl -s https://downloads.openwrt.org/releases/ | grep -oP 'href="\K[\d.]+' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
        echo "最新稳定版本: $STABLE_VERSION"
        
        # 构建分支列表：main, master, 动态版本号
        BRANCHES=(
          "main"
          "master"
          "$STABLE_VERSION"
          "openwrt-${STABLE_VERSION}"
        )
        
        echo "尝试分支列表: ${BRANCHES[*]}"
        
        # 尝试每个分支
        for branch in "${BRANCHES[@]}"; do
          echo "尝试分支: $branch"
          if git clone --depth 1 $REPO_URL -b "$branch" . 2>/dev/null; then
            echo "成功克隆分支: $branch"
            echo "REPO_BRANCH=$branch" >> $GITHUB_ENV
            break
          else
            echo "分支 $branch 不存在或克隆失败"
            rm -rf .git * .* 2>/dev/null || true
          fi
        done
        
        # 检查是否成功克隆
        if [ ! -d ".git" ]; then
          echo "错误: 所有分支尝试失败"
          echo "尝试获取远程分支列表..."
          git ls-remote --heads $REPO_URL | awk '{print $2}' | sed 's|refs/heads/||'
          exit 1
        fi
        
        echo "commitHash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
        echo "使用的分支: ${{ env.REPO_BRANCH }}"
        echo "commitHash为: $(git rev-parse HEAD)"

    - name: Compare Commit Hash
      id: cacheHash
      uses: actions/cache@v4
      with:
        path: .commitHash
        key: HEAD-${{ steps.getHash.outputs.commitHash }}

    - name: Save New Commit Hash
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: |
        echo ${{ steps.getHash.outputs.commitHash }} | tee .commitHash

    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ secrets.ACTIONS_TRIGGER_PAT }}
        event-type: Lienol Source Code Update
        client-payload: '{"repo_url": "${{ env.REPO_URL }}", "branch": "${{ env.REPO_BRANCH }}"}'

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        token: ${{ github.token }}
        repository: ${{ github.repository }}
        retain_days: 0
        keep_minimum_runs: 1