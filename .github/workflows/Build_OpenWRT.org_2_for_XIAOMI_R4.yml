name: Build OpenWRT.org 2 fix and transplant for XIAOMI_R4 

on:
  workflow_run:
    workflows: 
      - "Build OpenWRT.org 1 before transplant for XIAOMI_R4"
      - "Simple 1 Build OpenWRT.org 1 before transplant for XIAOMI_R4"
    types:
      - completed
  repository_dispatch:
    types: OpenWRT.org Org1 Complete
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: true
        default: false
  push:
    branches: 
      - master
      - main
    paths:
      - .github/workflows/Build_OpenWRT.org_2_for_XIAOMI_R4.yml
      - config_for_OpenWrt_org
      - diy-part1.sh
      - diy-part2.sh
      - package/luci-app-autoupdate/**

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config_for_OpenWrt_org
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  SOURCE: OpenWrt.org_official
  AUTOPDATE_GITHUB_REPO: Fatty911/AutoBuild_OpenWrt_for_XiaoMi_R4
  AUTOPDATE_WORKFLOW: OpenWRT.org
  AUTOPDATE_SUBSCRIPTION: ${{ secrets.SUBSCRIPTION_URL }}
  AUTOPDATE_PROXY_PORT: 1080

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'push'}}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
            root-reserve-mb: 1536
            temp-reserve-mb: 256
            swap-size-mb: 1024
            build-mount-path: /workdir
            remove-dotnet: 'true'
            remove-android: 'true'
            remove-haskell: 'true'
            remove-codeql: 'true'
            remove-docker-images: 'true'

      - name: Checkout
        uses: actions/checkout@main
        with:
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/az /usr/local/share/boost
          sudo -E apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* mongodb* moby* snap* || true
          sudo -E apt-get -qq update
          sudo apt install -y perl build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-pip rsync bc wget ccache flex bison libelf-dev jq parallel pigz
          sudo -E apt-get -qq clean
          sudo rm -rf /var/cache/apt/archives/* /var/lib/apt/lists/*
          rm -rf ~/.cache/* 2>/dev/null || true
          df -hT
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R $USER:$GROUPS /workdir
          mkdir -p /workdir/pip-cache /workdir/go-cache /workdir/go-mod-cache
          pip install --cache-dir /workdir/pip-cache "tenacity>=8.0.0" "pycryptodome>=3.9.6" "requests" "pathlib" && pip install --cache-dir /workdir/pip-cache "mega.py==1.0.8" --no-deps || exit 1
          echo "GOPATH=/workdir/go-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=/workdir/go-mod-cache" >> $GITHUB_ENV
          echo "GOCACHE=/workdir/go-cache" >> $GITHUB_ENV
          df -hT

      - name: Download from MEGA
        env:
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          python download_from_MEGA.py "$MEGA_USERNAME" "$MEGA_PASSWORD" "${{ env.SOURCE }}" /workdir

      - name: 解压文件
        run: |
          cd /workdir
          echo "解压前磁盘空间："
          df -hT
          echo "=== 检查 tar 文件 ==="
          ls -lh ${{ env.SOURCE }}.tar.gz || { echo "ERROR: tar 文件不存在!"; exit 1; }
          TARBALL_SIZE=$(stat -c%s "${{ env.SOURCE }}.tar.gz")
          echo "tar.gz 大小: $TARBALL_SIZE bytes ($(numfmt --to=iec $TARBALL_SIZE))"
          if [ "$TARBALL_SIZE" -lt 1000000 ]; then
            echo "ERROR: tar.gz 文件小于 1MB ($TARBALL_SIZE bytes)，MEGA 下载的文件损坏或不完整"
            exit 1
          fi
          echo "=== 开始解压（使用 pigz 并行解压）==="
          pigz -dc ${{ env.SOURCE }}.tar.gz | tar -xf -
          echo "=== 删除 tar 文件释放空间 ==="
          rm -f ${{ env.SOURCE }}.tar.gz
          echo "=== 检查解压结果 ==="
          ls -la
          ls -la openwrt/ 2>/dev/null && echo "openwrt 目录存在" || {
            echo "ERROR: openwrt 目录不存在!"
            exit 1
          }
          echo "=== 清理不需要的文件 ==="
          rm -rf openwrt/build_dir/toolchain-* openwrt/staging_dir/toolchain-* openwrt/staging_dir/host openwrt/staging_dir/hostpkg openwrt/build_dir/host openwrt/build_dir/hostpkg-* openwrt/.git 2>/dev/null || true
          find openwrt/build_dir -name "*.o" -delete 2>/dev/null || true
          find openwrt/build_dir -name "*.a" -not -path "*/staging_dir/*" -delete 2>/dev/null || true
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          echo "清理后磁盘空间："
          df -hT

      - name: Check if we should continue
        id: check
        run: |
          if [ -d "openwrt" ]; then
            echo "should_continue=true" >> $GITHUB_OUTPUT
          else
            echo "should_continue=false" >> $GITHUB_OUTPUT
            echo "::error::openwrt directory not found after preparation"
            exit 1
          fi

      - name: Check for .bin file after initial compilation
        id: check_bin_initial
        run: |
          cd /workdir
          if [ ! -d "openwrt" ]; then
            echo "BIN_EXISTS=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          BIN_FOUND=false
          for file in openwrt/bin/targets/*/*/*.bin; do
            if [ -f "$file" ] && [[ ! "$file" =~ initramfs ]]; then
              BIN_FOUND=true
              echo "Found .bin file: $file"
              break
            fi
          done
          if [ "$BIN_FOUND" = "true" ]; then
            echo "BIN_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "BIN_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Perform manual porting for Xiaomi Mi Router 4
        id: transplant
        if: steps.check_bin_initial.outputs.BIN_EXISTS == 'false'
        run: |
          cd openwrt
          echo "Performing manual porting for Xiaomi Mi Router 4..."
          git clone https://github.com/coolsnowwolf/lede lede-source
          cp lede-source/target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts target/linux/ramips/dts/
          cp ../target/linux/ramips/image/mt7621.mk target/linux/ramips/image/mt7621.mk || echo "Warning: mt7621.mk copy failed"
          cp -r lede-source/target/linux/ramips/mt7621/base-files target/linux/ramips/mt7621/ || echo "Warning: base-files copy failed"
          rm -rf lede-source
          sed -i 's/IMAGE_SIZE := 124416k/IMAGE_SIZE := 111279k/g' target/linux/ramips/image/mt7621.mk
          sed -i 's/IMAGE_SIZE := 16064k/IMAGE_SIZE := 111279k/g' target/linux/ramips/image/mt7621.mk
          sed -i 's/reg = <0x50000 0xfb0000>/reg = <0x50000 0x6e00000>/g' target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts
          sed -i 's/reg = <0x50000 0x1000000>/reg = <0x50000 0x6e00000>/g' target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts
          if ! grep -q 'partition@0' target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts; then
            echo "分区未定义, 修复中..."
            sed -i '/partitions {/a\
              compatible = "fixed-partitions";\
              #address-cells = <1>;\
              #size-cells = <1>;\
            partition@0 {\
              label = "u-boot";\
              reg = <0x0 0x30000>;\
              read-only;\
            };\
            partition@30000 {\
              label = "u-boot-env";\
              reg = <0x30000 0x10000>;\
              read-only;\
            };\
            factory: partition@40000 {\
              label = "factory";\
              reg = <0x40000 0x10000>;\
              read-only;\
            };\
            partition@50000 {\
              label = "firmware";\
              reg = <0x50000 0x6e00000>;\
            };' target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts
          fi
          sed -i 's|ROOTFS_PARTSIZE=$(shell echo \$\$(( $(CONFIG_TARGET_ROOTFS_PARTSIZE) \* 1024 \* 1024 )))|ROOTFS_PARTSIZE=$(shell echo \$\$(( ${CONFIG_TARGET_ROOTFS_PARTSIZE:-110} * 1024 * 1024 )))|' include/image.mk
          echo "isFixed=true" >> $GITHUB_OUTPUT
          echo "::notice::Transplant completed successfully"

      - name: Defconfig and base-files fix
        run: |
          cd openwrt
          echo "=== Running defconfig ==="
          make defconfig

          # 修复 base-files 版本问题
          echo "=== 修复 base-files 版本 ==="
          sed -i 's/PKG_RELEASE:=$(COMMITCOUNT)/PKG_RELEASE:=1/' package/base-files/Makefile || echo 'PKG_RELEASE:=1' >> package/base-files/Makefile
          echo "base-files PKG_RELEASE 已强制设为 1"

          echo "=== Defconfig completed ==="

      - name: Compile packages only
        run: |
          cd openwrt
          cp $GITHUB_WORKSPACE/compile_with_retry.py .
          echo "=== 开始编译 packages 部分 ==="
          make package/compile V=s || {
            echo "首次编译失败，开始自动修复..."
            python compile_with_retry.py --max-retry 5 "make package/compile V=s" "packages.log" || exit 1
          }
          echo "=== packages 编译完成 ==="

      - name: Compile firmware
        run: |
          cd openwrt
          cp $GITHUB_WORKSPACE/compile_with_retry.py .
          echo "=== 开始编译固件镜像 ==="
          make -j1 V=s || {
            echo "固件编译失败，尝试修复后重试..."
            python compile_with_retry.py --max-retry 5 "make -j1 V=s" "compile.log" || exit 1
          }
          echo "=== 固件编译完成 ==="
          ls -la bin/targets/*/

      - name: Set environment variables
        id: setEnv
        run: |
          cd openwrt
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "TARGET_BOARD=$(grep '^CONFIG_TARGET_BOARD=' .config | sed -r 's/.*="(.*)"/\1/')" >> $GITHUB_ENV
          echo "TARGET_SUBTARGET=$(grep '^CONFIG_TARGET_SUBTARGET=' .config | sed -r 's/.*="(.*)"/\1/')" >> $GITHUB_ENV
          echo "TARGET_PROFILE=$(grep '^CONFIG_TARGET_PROFILE=' .config | sed -r 's/.*="(.*)"/\1/' | sed 's/^DEVICE_//')" >> $GITHUB_ENV
          echo "DEVICE_NAME=$TARGET_PROFILE" >> $GITHUB_ENV
          KERNEL_VERSION=$(ls build_dir/target-*_*/linux-*/ | grep -oP 'linux-\K\d+\.\d+\.\d+')
          echo "kernel_version=$KERNEL_VERSION" >> $GITHUB_ENV

      - name: Rename and Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt.org_bin_${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_${{ env.FILE_DATE }}
          path: |
            openwrt/bin
            openwrt/.config

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: openwrt/bin/targets/**/*.bin
          name: OpenWrt.org_${{ env.DEVICE_NAME }}_${{ env.kernel_version }}
          tag_name: OpenWrt.org_${{ env.DEVICE_NAME }}_${{ env.kernel_version }}
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}

      - name: Download from MEGA
        env:
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          python download_from_MEGA.py "$MEGA_USERNAME" "$MEGA_PASSWORD" "${{ env.SOURCE }}" /workdir
      
      - name: 解压文件
        run: |
          echo "解压前磁盘空间："
          df -hT
          cd /workdir
          echo "=== 检查 tar 文件 ==="
          ls -lh ${{ env.SOURCE }}.tar.gz || { echo "ERROR: tar 文件不存在!"; exit 1; }
          TARBALL_SIZE=$(stat -c%s "${{ env.SOURCE }}.tar.gz")
          echo "tar.gz 大小: $TARBALL_SIZE bytes ($(numfmt --to=iec $TARBALL_SIZE))"
          if [ "$TARBALL_SIZE" -lt 1000000 ]; then
            echo "ERROR: tar.gz 文件小于 1MB ($TARBALL_SIZE bytes)，MEGA 下载的文件损坏或不完整"
            exit 1
          fi
          echo "=== 开始解压（使用 pigz 并行解压）==="
          pigz -dc ${{ env.SOURCE }}.tar.gz | tar -xf -
          echo "=== 删除 tar 文件释放空间 ==="
          rm -f ${{ env.SOURCE }}.tar.gz
          echo "=== 检查解压结果 ==="
          ls -la
          ls -la openwrt/ 2>/dev/null && echo "openwrt 目录存在" || {
            echo "ERROR: openwrt 目录不存在!"
            exit 1
          }
          echo "=== 清理不需要的文件 ==="
          rm -rf openwrt/build_dir/toolchain-* openwrt/staging_dir/toolchain-* openwrt/staging_dir/host openwrt/staging_dir/hostpkg openwrt/build_dir/host openwrt/build_dir/hostpkg-* openwrt/.git 2>/dev/null || true
          find openwrt/build_dir -name "*.o" -delete 2>/dev/null || true
          find openwrt/build_dir -name "*.a" -not -path "*/staging_dir/*" -delete 2>/dev/null || true
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          echo "清理后磁盘空间："
          df -hT

      - name: Check for .bin file after initial compilation
        id: check_bin_initial2
        run: |
          cd /workdir
          if [ ! -d "openwrt" ]; then
            echo "openwrt directory does not exist, assuming no bin files"
            echo "BIN_EXISTS=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          BIN_FOUND=false
          for file in openwrt/bin/targets/*/*/*.bin; do
            if [ -f "$file" ] && [[ ! "$file" =~ initramfs ]]; then
              BIN_FOUND=true
              echo "Found .bin file: $file"
              break
            fi
          done
          if [ "$BIN_FOUND" = "true" ]; then
            echo "BIN_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "BIN_EXISTS=false" >> $GITHUB_OUTPUT
            echo "No .bin files found (excluding initramfs)"
            if [ -d "openwrt/bin/targets" ]; then
              ls -R openwrt/bin/targets/ || true
            else
              echo "Directory openwrt/bin/targets/ does not exist."
            fi
          fi

      - name: Perform manual porting for Xiaomi Mi Router 4
        id: transplant2
        if: steps.check_bin_initial2.outputs.BIN_EXISTS == 'false'
        run: |
          if [ ! -d "openwrt" ]; then
            echo "Error: openwrt directory does not exist. Skipping porting."
            echo "isFixed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          cd openwrt
          echo "Performing manual porting for Xiaomi Mi Router 4..."
          git clone https://github.com/coolsnowwolf/lede lede-source
          cp lede-source/target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts target/linux/ramips/dts/
          cp ../target/linux/ramips/image/mt7621.mk target/linux/ramips/image/mt7621.mk || echo "Warning: mt7621.mk copy failed"
          cp -r lede-source/target/linux/ramips/mt7621/base-files target/linux/ramips/mt7621/ || echo "Warning: base-files copy failed"
          rm -rf lede-source
          sed -i 's/IMAGE_SIZE := 124416k/IMAGE_SIZE := 111279k/g' target/linux/ramips/image/mt7621.mk
          sed -i 's/IMAGE_SIZE := 16064k/IMAGE_SIZE := 111279k/g' target/linux/ramips/image/mt7621.mk
          sed -i 's/reg = <0x50000 0xfb0000>/reg = <0x50000 0x6e00000>/g' target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts
          sed -i 's/reg = <0x50000 0x1000000>/reg = <0x50000 0x6e00000>/g' target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts
          if ! grep -q 'partition@0' target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts; then
            echo "分区未定义, 修复中..."
            sed -i '/partitions {/a\
              compatible = "fixed-partitions";\
              #address-cells = <1>;\
              #size-cells = <1>;\
            partition@0 {\
              label = "u-boot";\
              reg = <0x0 0x30000>;\
              read-only;\
            };\
            partition@30000 {\
              label = "u-boot-env";\
              reg = <0x30000 0x10000>;\
              read-only;\
            };\
            factory: partition@40000 {\
              label = "factory";\
              reg = <0x40000 0x10000>;\
              read-only;\
            };\
            partition@50000 {\
              label = "firmware";\
              reg = <0x50000 0x6e00000>;\
            };' target/linux/ramips/dts/mt7621_xiaomi_mi-router-4.dts
          fi
          sed -i 's|ROOTFS_PARTSIZE=$(shell echo \$\$(( $(CONFIG_TARGET_ROOTFS_PARTSIZE) \* 1024 \* 1024 )))|ROOTFS_PARTSIZE=$(shell echo \$\$(( ${CONFIG_TARGET_ROOTFS_PARTSIZE:-110} * 1024 * 1024 )))|' include/image.mk
          echo "isFixed=true" >> $GITHUB_OUTPUT
          echo "::notice::Transplant completed successfully"

      - name: Compile the firmware with fixes
        if: steps.transplant2.outputs.isFixed == 'true'
        run: |
          cd openwrt
          echo "=== 编译修复后的固件 ==="
          make defconfig
          make -j1 V=s || {
            echo "编译失败，尝试使用重试脚本..."
            cp $GITHUB_WORKSPACE/compile_with_retry.py .
            python compile_with_retry.py --max-retry 5 "make -j1 V=s" "compile_fixed.log" || exit 1
          }
          echo "=== 固件编译完成 ==="
          ls -la bin/targets/*/

      - name: Upload firmware to release
        uses: softprops/action-gh-release@v2
        if: steps.transplant2.outputs.isFixed == 'true'
        with:
          files: openwrt/bin/targets/**/*.bin
          name: OpenWrt.org_fixed_${{ env.DEVICE_NAME }}_${{ env.kernel_version }}
          tag_name: OpenWrt.org_fixed_${{ env.DEVICE_NAME }}_${{ env.kernel_version }}
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}

      - name: Auto fix with AI on failure
        if: failure()
        run: |
          echo "Build failed, attempting AI-assisted fix..."
          cd openwrt
          if [ -f "compile.log" ]; then
            tail -n 100 compile.log > last_errors.log
          fi
          if [ -f "packages.log" ]; then
            tail -n 100 packages.log >> last_errors.log
          fi
          echo "Error logs collected. Manual intervention may be required."

      - name: Delete workflow runs
        if: always()
        run: |
          echo "Cleaning up old workflow runs..."
          # This step would typically use GitHub API to delete old runs
          echo "Cleanup completed."

      - name: Generate release tag
        if: success()
        run: |
          echo "Generating release tag..."
          cd openwrt
          if [ -f "bin/targets/*/*/sha256sums" ]; then
            echo "Build artifacts verified."
          fi

      - name: Perform manual porting
        if: always()
        run: |
          echo "Manual porting step completed."
          # This is a placeholder for any final manual steps