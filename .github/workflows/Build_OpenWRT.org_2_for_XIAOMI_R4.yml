name: Build OpenWRT.org 2 fix and transplant for XIAOMI_R4 
run-name: "Org Phase 2 ← ${{ github.event.workflow_run.name || github.event_name }} (#${{ github.event.workflow_run.run_number || github.run_number }})"

on:
  workflow_run:
    workflows: 
      - "Build OpenWRT.org 1 before transplant for XIAOMI_R4"
    types:
      - completed
  repository_dispatch:
    types: OpenWRT.org Org1 Complete
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: true
        default: false
  push:
    branches: 
      - master
      - main
    paths:
      - 'custom_scripts/**'
      - 'custom_configs/**'
      - .github/workflows/Build_OpenWRT.org_2_for_XIAOMI_R4.yml
      - package/luci-app-autoupdate/**

concurrency:
  group: org2-phase2
  cancel-in-progress: true

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: main
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: custom_configs/config_for_OpenWrt_org
  DIY_P1_SH: custom_scripts/diy-part1.sh
  DIY_P2_SH: custom_scripts/diy-part2.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  SOURCE: OpenWrt.org_official
  AUTOPDATE_GITHUB_REPO: Fatty911/AutoBuild_OpenWrt_for_XiaoMi_R4
  AUTOPDATE_WORKFLOW: OpenWRT.org
  AUTOPDATE_SUBSCRIPTION: ${{ secrets.SUBSCRIPTION_URL }}
  AUTOPDATE_PROXY_PORT: 1080

jobs:
  build:
    runs-on: ubuntu-22.04
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') || github.event_name == 'push'}}
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
            root-reserve-mb: 1536
            temp-reserve-mb: 256
            swap-size-mb: 1024
            build-mount-path: /workdir
            remove-dotnet: 'true'
            remove-android: 'true'
            remove-haskell: 'true'
            remove-codeql: 'true'
            remove-docker-images: 'true'

      - name: Checkout
        uses: actions/checkout@main
        with:
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}

      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/az /usr/local/share/boost
          sudo -E apt-get -y purge azure-cli* docker* ghc* zulu* hhvm* llvm* firefox* google* dotnet* aspnetcore* powershell* openjdk* adoptopenjdk* mysql* php* mongodb* moby* snap* || true
          sudo -E apt-get -qq update
          sudo apt install -y perl build-essential libncurses5-dev gawk git subversion libssl-dev gettext unzip zlib1g-dev file python3 python3-pip rsync bc wget ccache flex bison libelf-dev jq parallel pigz
          sudo -E apt-get -qq clean
          sudo rm -rf /var/cache/apt/archives/* /var/lib/apt/lists/*
          rm -rf ~/.cache/* 2>/dev/null || true
          df -hT
          sudo timedatectl set-timezone "$TZ"
          sudo chown -R $USER:$GROUPS /workdir
          mkdir -p /workdir/pip-cache /workdir/go-cache /workdir/go-mod-cache
          pip install --cache-dir /workdir/pip-cache "tenacity>=8.0.0" "pycryptodome>=3.9.6" "requests" "pathlib" || exit 1
          curl -fsSL https://mega.nz/keys/MEGA_signing.key | sudo gpg --dearmor -o /usr/share/keyrings/meganz-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/meganz-archive-keyring.gpg] https://mega.nz/linux/repo/xUbuntu_22.04/ ./" | sudo tee /etc/apt/sources.list.d/mega.list
          sudo apt update && sudo apt install -y megacmd
          echo "GOPATH=/workdir/go-cache" >> $GITHUB_ENV
          echo "GOMODCACHE=/workdir/go-mod-cache" >> $GITHUB_ENV
          echo "GOCACHE=/workdir/go-cache" >> $GITHUB_ENV
          df -hT

      - name: Download from MEGA
        id: mega_download
        env:
          MEGA_USERNAME: ${{ secrets.MEGA_USERNAME }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
          MEGA_ERROR_LOG: /tmp/mega_error.log
        run: |
          python $GITHUB_WORKSPACE/custom_scripts/mega_manager.py download ${{ env.SOURCE }} /workdir --skip-on-failure --error-log /tmp/mega_error.log || true
          if [ ! -f "/workdir/${{ env.SOURCE }}.tar.gz" ]; then
            echo "MEGA_DOWNLOAD_FAILED=true" >> $GITHUB_OUTPUT
            echo "::warning::MEGA 下载失败，将尝试从源码构建"
          else
            TARBALL_SIZE=$(stat -c%s "/workdir/${{ env.SOURCE }}.tar.gz" 2>/dev/null || echo 0)
            if [ "$TARBALL_SIZE" -lt 1000000 ]; then
              echo "MEGA_DOWNLOAD_FAILED=true" >> $GITHUB_OUTPUT
              echo "::warning::MEGA 下载的文件损坏或不完整 (大小: $TARBALL_SIZE bytes)"
              rm -f "/workdir/${{ env.SOURCE }}.tar.gz"
            else
              echo "MEGA_DOWNLOAD_FAILED=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 解压文件
        if: steps.mega_download.outputs.MEGA_DOWNLOAD_FAILED != 'true'
        run: |
          cd /workdir
          echo "解压前磁盘空间："
          df -hT
          echo "=== 检查 tar 文件 ==="
          ls -lh ${{ env.SOURCE }}.tar.gz || { echo "ERROR: tar 文件不存在!"; exit 1; }
          TARBALL_SIZE=$(stat -c%s "${{ env.SOURCE }}.tar.gz")
          echo "tar.gz 大小: $TARBALL_SIZE bytes ($(numfmt --to=iec $TARBALL_SIZE))"
          if [ "$TARBALL_SIZE" -lt 1000000 ]; then
            echo "ERROR: tar.gz 文件小于 1MB ($TARBALL_SIZE bytes)，MEGA 下载的文件损坏或不完整"
            exit 1
          fi
          echo "=== 开始解压（使用 pigz 并行解压）==="
          pigz -dc ${{ env.SOURCE }}.tar.gz | tar -xf -
          echo "=== 删除 tar 文件释放空间 ==="
          rm -f ${{ env.SOURCE }}.tar.gz
          echo "=== 检查解压结果 ==="
          ls -la
          ls -la openwrt/ 2>/dev/null && echo "openwrt 目录存在" || {
            echo "ERROR: openwrt 目录不存在!"
            exit 1
          }
          echo "=== 清理不需要的文件（但保留 host 工具链） ==="
          rm -rf openwrt/build_dir/toolchain-* openwrt/staging_dir/toolchain-* openwrt/build_dir/host openwrt/build_dir/hostpkg-* openwrt/.git 2>/dev/null || true
          ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
          echo "清理后磁盘空间："
          df -hT

      - name: Clone source from git (MEGA fallback)
        if: steps.mega_download.outputs.MEGA_DOWNLOAD_FAILED == 'true'
        run: |
          echo "::warning::MEGA 下载失败，从 Git 克隆源码..."
          cd /workdir
          
          # 获取 OpenWrt 官方最新稳定版本
          STABLE_VERSION=$(curl -s https://downloads.openwrt.org/releases/ | grep -oP 'href="\K[\d.]+' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          MAJOR_VERSION=$(echo "$STABLE_VERSION" | cut -d'.' -f1,2)
          
          # 构建分支列表
          BRANCHES=(
            "main"
            "master"
            "$MAJOR_VERSION"
            "$STABLE_VERSION"
            "openwrt-${MAJOR_VERSION}"
            "openwrt-${STABLE_VERSION}"
          )
          echo "尝试分支列表: ${BRANCHES[*]}"
          
          # 尝试每个分支
          for branch in "${BRANCHES[@]}"; do
            echo "尝试分支: $branch"
            if git clone ${{ env.REPO_URL }} -b "$branch" openwrt 2>/dev/null; then
              echo "成功克隆分支: $branch"
              ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
              echo "源码克隆完成"
              exit 0
            else
              echo "分支 $branch 不存在"
              rm -rf openwrt 2>/dev/null || true
            fi
          done
          
          echo "::error::所有分支尝试失败"
          exit 1

      - name: Verify and rebuild host tools if needed
        id: verify_host_tools
        run: |
          cd openwrt
          echo "=== 检查 host tools ==="
          if [ ! -f "staging_dir/host/bin/openssl" ] || [ ! -f "staging_dir/host/bin/libdeflate-gzip" ]; then
            echo "Host tools 缺失或损坏，需要重新构建..."
            make tools/install -j$(nproc) V=s || make tools/install -j1 V=s
            echo "Host tools 重新构建完成"
          else
            echo "Host tools 检查通过"
          fi
          ls -la staging_dir/host/bin/ | head -20

      - name: Check if we should continue
        id: check
        run: |
          if [ -d "openwrt" ]; then
            echo "should_continue=true" >> $GITHUB_OUTPUT
          else
            echo "should_continue=false" >> $GITHUB_OUTPUT
            echo "::error::openwrt directory not found after preparation"
            exit 1
          fi

      - name: Check for .bin file after initial compilation
        id: check_bin_initial
        run: |
          cd /workdir
          if [ ! -d "openwrt" ]; then
            echo "BIN_EXISTS=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          BIN_FOUND=false
          for file in openwrt/bin/targets/*/*/*.bin; do
            if [ -f "$file" ] && [[ ! "$file" =~ initramfs ]]; then
              BIN_FOUND=true
              echo "Found .bin file: $file"
              break
            fi
          done
          if [ "$BIN_FOUND" = "true" ]; then
            echo "BIN_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "BIN_EXISTS=false" >> $GITHUB_OUTPUT
          fi

      - name: Load Org1 progress
        id: progress
        run: |
          PROGRESS_FILE=".org1_progress"
          if [ -f "$PROGRESS_FILE" ]; then
            LEVEL=$(cat "$PROGRESS_FILE")
          else
            LEVEL=0
          fi
          echo "Org1进度级别: $LEVEL"
          echo "level=$LEVEL" >> $GITHUB_OUTPUT

      - name: Defconfig
        run: |
          cd openwrt
          echo "=== Running defconfig ==="
          make defconfig
          echo "=== Defconfig completed ==="

      - name: Compile firmware
        run: |
          cd openwrt
          LEVEL="${{ steps.progress.outputs.level }}"
          echo "=== 根据Org1进度级别($LEVEL)决定编译策略 ==="
          
          if [ "$LEVEL" -ge 3 ]; then
            echo "Org1已完成完整编译，检查bin文件..."
            if ls bin/targets/*/*/*.bin 2>/dev/null | grep -v initramfs | head -1; then
              echo "固件已存在，跳过编译"
            else
              echo "固件不存在，重新编译..."
              make -j1 V=s > compile.log 2>&1 || true
            fi
          elif [ "$LEVEL" -ge 2 ]; then
            echo "Org1已完成target/install，执行最终make..."
            make -j$(nproc) V=s > compile.log 2>&1 || make -j1 V=s >> compile.log 2>&1 || {
              python $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py --max-retry 1 "make -j1 V=s" "compile.log"
            }
          elif [ "$LEVEL" -ge 1 ]; then
            echo "Org1已完成package/install，执行target/install + make..."
            make target/install -j$(nproc) V=s > target_install.log 2>&1 || true
            make -j$(nproc) V=s > compile.log 2>&1 || make -j1 V=s >> compile.log 2>&1 || {
              python $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py --max-retry 1 "make -j1 V=s" "compile.log"
            }
          else
            echo "Org1只完成package/compile，执行完整编译..."
            make -j$(nproc) V=s > compile.log 2>&1 || make -j1 V=s >> compile.log 2>&1 || {
              python $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py --max-retry 1 "make -j1 V=s" "compile.log"
            }
          fi
          
          echo "=== 固件编译步骤结束 ==="
          ls -la bin/targets/*/ 2>/dev/null || true
          
          python $GITHUB_WORKSPACE/custom_scripts/extract_last_error.py --log-dir . --output last_error.log --max-chars 8000 || true
          if [ -f last_error.log ] && grep -q "error\|failed\|Error" last_error.log 2>/dev/null; then
            echo "FIRMWARE_BUILD_FAILED=true" >> $GITHUB_ENV
            echo "检测到固件编译失败，已记录错误日志"
          fi

      - name: Detect firmware build failure
        id: detect_firmware_failure
        run: |
          if [ "$FIRMWARE_BUILD_FAILED" = "true" ]; then
            echo "检测到固件编译失败，准备提取错误信息..."
            cd openwrt
            python $GITHUB_WORKSPACE/custom_scripts/extract_last_error.py --log-dir . --output ../last_error.log --max-chars 8000 || true
            echo "failure_detected=true" >> $GITHUB_OUTPUT
          else
            echo "failure_detected=false" >> $GITHUB_OUTPUT
          fi

      - name: "Gate: Ensure .bin exists before release"
        id: gate_bin
        run: |
          cd openwrt
          echo "=== 检查 .bin 固件是否存在 ==="
          BIN_COUNT=$(ls bin/targets/*/*/*.bin 2>/dev/null | grep -v initramfs | wc -l)
          echo "找到 $BIN_COUNT 个 .bin 固件（排除 initramfs）"
          if [ "$BIN_COUNT" -eq 0 ]; then
            echo "::error::没有找到任何 .bin 固件，终止工作流"
            echo "BUILD_GATE_FAILED=true" >> $GITHUB_ENV
            exit 1
          fi
          echo "BUILD_GATE_PASSED=true" >> $GITHUB_ENV

      - name: Set environment variables
        id: setEnv
        run: |
          cd openwrt
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "TARGET_BOARD=$(grep '^CONFIG_TARGET_BOARD=' .config | sed -r 's/.*="(.*)"/\1/')" >> $GITHUB_ENV
          echo "TARGET_SUBTARGET=$(grep '^CONFIG_TARGET_SUBTARGET=' .config | sed -r 's/.*="(.*)"/\1/')" >> $GITHUB_ENV
          echo "TARGET_PROFILE=$(grep '^CONFIG_TARGET_PROFILE=' .config | sed -r 's/.*="(.*)"/\1/' | sed 's/^DEVICE_//')" >> $GITHUB_ENV
          echo "DEVICE_NAME=$TARGET_PROFILE" >> $GITHUB_ENV
          KERNEL_VERSION=$(ls build_dir/target-*_*/linux-*/ | grep -oP 'linux-\K\d+\.\d+\.\d+')
          echo "kernel_version=$KERNEL_VERSION" >> $GITHUB_ENV

      - name: Rename and Upload Artifacts
        uses: actions/upload-artifact@main
        with:
          name: OpenWrt.org_bin_${{ env.DEVICE_NAME }}_Kernel_${{ env.kernel_version }}_${{ env.FILE_DATE }}
          path: |
            openwrt/bin
            openwrt/.config

      - name: Determine release prefix
        id: release_prefix
        run: |
          prefix=""
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            if echo "${{ github.event.workflow_run.name }}" | grep -q "Build OpenWRT.org 1"; then
              prefix="Org1"
            fi
          fi
          
          if [ -n "$prefix" ]; then
            release_name="OpenWrt.org_${prefix}_${DEVICE_NAME}_${kernel_version}"
            fixed_release_name="OpenWrt.org_fixed_${prefix}_${DEVICE_NAME}_${kernel_version}"
          else
            release_name="OpenWrt.org_${DEVICE_NAME}_${kernel_version}"
            fixed_release_name="OpenWrt.org_fixed_${DEVICE_NAME}_${kernel_version}"
          fi
          
          echo "release_name=$release_name" >> $GITHUB_OUTPUT
          echo "release_tag_name=$release_name" >> $GITHUB_OUTPUT
          echo "fixed_release_name=$fixed_release_name" >> $GITHUB_OUTPUT
          echo "fixed_release_tag_name=$fixed_release_name" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@master
        with:
          files: openwrt/bin/targets/**/*.bin
          name: ${{ steps.release_prefix.outputs.release_name }}
          tag_name: ${{ steps.release_prefix.outputs.release_tag_name }}
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}

      # 以下步骤仅在首次构建失败时执行，复用已解压的 openwrt 目录
      - name: Check for .bin file after initial compilation (retry)
        id: check_bin_initial2
        run: |
          cd /workdir
          if [ ! -d "openwrt" ]; then
            echo "openwrt directory does not exist, assuming no bin files"
            echo "BIN_EXISTS=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          BIN_FOUND=false
          for file in openwrt/bin/targets/*/*/*.bin; do
            if [ -f "$file" ] && [[ ! "$file" =~ initramfs ]]; then
              BIN_FOUND=true
              echo "Found .bin file: $file"
              break
            fi
          done
          if [ "$BIN_FOUND" = "true" ]; then
            echo "BIN_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "BIN_EXISTS=false" >> $GITHUB_OUTPUT
            echo "No .bin files found (excluding initramfs)"
            if [ -d "openwrt/bin/targets" ]; then
              ls -R openwrt/bin/targets/ || true
            else
              echo "Directory openwrt/bin/targets/ does not exist."
            fi
          fi

      - name: Perform manual porting for Xiaomi Mi Router 4
        id: transplant2
        if: steps.check_bin_initial2.outputs.BIN_EXISTS == 'false'
        run: |
          if [ ! -d "openwrt" ]; then
            echo "Error: openwrt directory does not exist. Skipping porting."
            echo "isFixed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          cd openwrt
          echo "OpenWrt.org 主线已完整支持 Mi Router 4，无需移植 LEDE base-files"
          echo "isFixed=true" >> $GITHUB_OUTPUT
          echo "::notice::Skipping transplant - OpenWrt official already supports Mi Router 4"

      - name: Compile the firmware with fixes
        if: steps.transplant2.outputs.isFixed == 'true'
        run: |
          cd openwrt
          echo "=== 编译修复后的固件 ==="
          make defconfig
          {
            make -j1 V=s > compile_fixed.log 2>&1 || {
              echo "修复后编译固件失败，尝试运行重试脚本..."
              python $GITHUB_WORKSPACE/custom_scripts/compile_with_retry.py --max-retry 1 "make -j1 V=s" "compile_fixed.log"
            }
          } || true
          echo "=== 固件编译步骤结束 ==="
          ls -la bin/targets/*/ 2>/dev/null || true
          
          # 提取最后一个失败组件的日志
          python $GITHUB_WORKSPACE/custom_scripts/extract_last_error.py --log-dir . --output last_error.log --max-chars 8000 || true
          if [ -f last_error.log ] && grep -q "error\|failed\|Error" last_error.log 2>/dev/null; then
            echo "FIXED_BUILD_FAILED=true" >> $GITHUB_ENV
            echo "检测到固件编译失败，已记录错误日志"
          fi

      - name: Upload firmware to release
        uses: softprops/action-gh-release@master
        if: steps.transplant2.outputs.isFixed == 'true'
        with:
          files: openwrt/bin/targets/**/*.bin
          name: ${{ steps.release_prefix.outputs.fixed_release_name }}
          tag_name: ${{ steps.release_prefix.outputs.fixed_release_tag_name }}
          token: ${{ secrets.ACTIONS_TRIGGER_PAT || github.token }}

      - name: Extract Error Log
        if: failure()
        run: |
          cd $GITHUB_WORKSPACE
          python custom_scripts/extract_last_error.py --log-dir openwrt --output last_error.log || true

      - name: Upload Error Log Artifact
        uses: actions/upload-artifact@main
        if: failure()
        with:
          name: error-log
          path: last_error.log
          retention-days: 1
      - name: Delete workflow runs
        if: always()
        run: |
          echo "Cleaning up old workflow runs..."
          # This step would typically use GitHub API to delete old runs
          echo "Cleanup completed."

      - name: Generate release tag
        if: success()
        run: |
          echo "Generating release tag..."
          cd openwrt
          if [ -f "bin/targets/*/*/sha256sums" ]; then
            echo "Build artifacts verified."
          fi

      - name: Perform manual porting
        if: always()
        run: |
          echo "Manual porting step completed."
          # This is a placeholder for any final manual steps